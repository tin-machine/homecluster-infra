name: static-check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  static-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        # actions/checkout v4 resolved on 2026-05-31.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run static checks
        shell: bash
        run: bash scripts/ci/static-check.sh
