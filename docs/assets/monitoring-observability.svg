    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font: 700 28px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .zone { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .external-zone { fill: #f8fafc; stroke: #94a3b8; }
      .lb-zone { fill: #eef2ff; stroke: #4f46e5; }
      .obs-zone { fill: #f0fdf4; stroke: #16a34a; }
      .storage-zone { fill: #ecfeff; stroke: #0891b2; }
      .box { fill: #ffffff; stroke: #64748b; stroke-width: 1.4; }
      .metrics { fill: #eff6ff; stroke: #2563eb; }
      .logs { fill: #fef2f2; stroke: #b91c1c; }
      .traces { fill: #f5f3ff; stroke: #7c3aed; }
      .storage { fill: #ecfdf5; stroke: #15803d; }
      .label { fill: #0f172a; font: 700 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #475569; font: 500 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { fill: #64748b; font: 500 11px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .icon { fill: none; stroke: currentColor; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
      .icon-neutral { color: #475569; }
      .icon-blue { color: #2563eb; }
      .icon-red { color: #b91c1c; }
      .icon-purple { color: #7c3aed; }
      .icon-green { color: #15803d; }
      .line { fill: none; stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
      .line-blue { fill: none; stroke: #2563eb; stroke-width: 2.2; marker-end: url(#arrow-blue); }
      .line-red { fill: none; stroke: #b91c1c; stroke-width: 2.2; marker-end: url(#arrow-red); }
      .line-purple { fill: none; stroke: #7c3aed; stroke-width: 2.2; marker-end: url(#arrow-purple); }
      .line-green { fill: none; stroke: #15803d; stroke-width: 2.2; marker-end: url(#arrow-green); }
    </style>
  </defs>

  <rect class="bg" width="1200" height="820" />
  <text class="title" x="48" y="52">monitoring / observability</text>

  <rect class="zone external-zone" x="48" y="96" width="270" height="214" rx="8" />
  <text class="label" x="74" y="128">cluster 外</text>

  <rect class="box" x="74" y="160" width="220" height="54" rx="8" />
  <use href="#icon-browser" class="icon icon-neutral" x="90" y="174" width="22" height="22" />
  <text class="label" x="188" y="184" text-anchor="middle">operator browser</text>
  <text class="tiny" x="188" y="202" text-anchor="middle">Grafana UI</text>

  <rect class="box" x="74" y="238" width="220" height="54" rx="8" />
  <use href="#icon-router-log" class="icon icon-red" x="90" y="252" width="22" height="22" />
  <text class="label" x="188" y="262" text-anchor="middle">OpenWrt syslog</text>
  <text class="tiny" x="188" y="280" text-anchor="middle">UDP 1514 / TCP 6514</text>

  <rect class="zone lb-zone" x="332" y="96" width="360" height="214" rx="8" />
  <text class="label" x="358" y="128">LoadBalancer services</text>

  <rect class="box" x="366" y="160" width="280" height="54" rx="8" />
  <use href="#icon-lb" class="icon icon-neutral" x="384" y="174" width="22" height="22" />
  <text class="label" x="516" y="184" text-anchor="middle">Grafana LoadBalancer</text>
  <text class="tiny" x="516" y="202" text-anchor="middle">dashboard access</text>

  <rect class="box" x="366" y="238" width="280" height="54" rx="8" />
  <use href="#icon-lb" class="icon icon-red" x="384" y="252" width="22" height="22" />
  <text class="label" x="516" y="262" text-anchor="middle">OTel syslog LoadBalancer</text>
  <text class="tiny" x="516" y="280" text-anchor="middle">router log intake</text>

  <rect class="zone storage-zone" x="724" y="96" width="376" height="214" rx="8" />
  <text class="label" x="750" y="128">object storage namespace</text>

  <rect class="box storage" x="790" y="170" width="244" height="72" rx="8" />
  <use href="#icon-bucket" class="icon icon-green" x="816" y="194" width="24" height="24" />
