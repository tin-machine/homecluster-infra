      <path d="M7 18h10" />
      <path d="M8 10h3" />
      <path d="M13 10h3" />
      <path d="M8 13h8" />
    </symbol>
    <symbol id="icon-lb" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="3" />
      <path d="M12 4v5" />
      <path d="M5 18l5-4" />
      <path d="M19 18l-5-4" />
      <circle cx="12" cy="4" r="2" />
      <circle cx="5" cy="18" r="2" />
      <circle cx="19" cy="18" r="2" />
    </symbol>
    <symbol id="icon-bucket" viewBox="0 0 24 24">
      <ellipse cx="12" cy="6" rx="7" ry="3" />
      <path d="M5 6v10c0 1.7 3.1 3 7 3s7-1.3 7-3V6" />
      <path d="M5 11c0 1.7 3.1 3 7 3s7-1.3 7-3" />
    </symbol>
    <symbol id="icon-node" viewBox="0 0 24 24">
      <rect x="5" y="5" width="14" height="14" rx="2" />
      <path d="M9 2v3" />
      <path d="M15 2v3" />
