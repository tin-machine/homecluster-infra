  <text class="small" x="912" y="220" text-anchor="middle">S3-compatible object storage</text>

  <rect class="zone obs-zone" x="48" y="360" width="1052" height="388" rx="8" />
  <text class="label" x="74" y="392">observability namespace</text>

  <rect class="box metrics" x="82" y="430" width="210" height="58" rx="8" />
  <use href="#icon-node" class="icon icon-blue" x="98" y="448" width="22" height="22" />
