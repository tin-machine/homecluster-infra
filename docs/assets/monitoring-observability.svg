  <use href="#icon-grafana" class="icon icon-neutral" x="862" y="572" width="24" height="24" />
  <text class="label" x="936" y="578" text-anchor="middle">Grafana</text>
  <text class="tiny" x="936" y="598" text-anchor="middle">dashboards / datasources</text>

