  <text class="tiny" x="190" y="474" text-anchor="middle">node metrics</text>

  <rect class="box metrics" x="82" y="512" width="210" height="58" rx="8" />
  <use href="#icon-kube" class="icon icon-blue" x="98" y="530" width="22" height="22" />
  <text class="label" x="190" y="537" text-anchor="middle">kube-state-metrics</text>
  <text class="tiny" x="190" y="556" text-anchor="middle">Kubernetes object metrics</text>

  <rect class="box traces" x="82" y="594" width="210" height="58" rx="8" />
  <use href="#icon-smoke" class="icon icon-purple" x="98" y="612" width="22" height="22" />
  <text class="label" x="190" y="619" text-anchor="middle">trace smoke CronJob</text>
  <text class="tiny" x="190" y="638" text-anchor="middle">OTLP producer</text>

  <rect class="box" x="312" y="470" width="210" height="88" rx="8" />
  <use href="#icon-otel" class="icon icon-neutral" x="336" y="502" width="26" height="26" />
  <text class="label" x="417" y="500" text-anchor="middle">OpenTelemetry</text>
  <text class="label" x="417" y="520" text-anchor="middle">Collector</text>
  <text class="tiny" x="417" y="540" text-anchor="middle">OTLP + pod log + syslog</text>

  <rect class="box metrics" x="580" y="420" width="184" height="58" rx="8" />
  <use href="#icon-metrics" class="icon icon-blue" x="598" y="438" width="22" height="22" />
  <text class="label" x="672" y="445" text-anchor="middle">Prometheus</text>
  <text class="tiny" x="672" y="464" text-anchor="middle">scrape / remote write</text>

  <rect class="box metrics" x="844" y="420" width="184" height="58" rx="8" />
  <use href="#icon-db-metrics" class="icon icon-blue" x="862" y="438" width="22" height="22" />
  <text class="label" x="936" y="445" text-anchor="middle">Mimir</text>
  <text class="tiny" x="936" y="464" text-anchor="middle">metrics store / query</text>

  <rect class="box logs" x="580" y="522" width="184" height="58" rx="8" />
  <use href="#icon-logs" class="icon icon-red" x="598" y="540" width="22" height="22" />
  <text class="label" x="672" y="547" text-anchor="middle">Loki</text>
  <text class="tiny" x="672" y="566" text-anchor="middle">log store / query</text>

  <rect class="box traces" x="580" y="624" width="184" height="58" rx="8" />
  <use href="#icon-traces" class="icon icon-purple" x="598" y="642" width="22" height="22" />
  <text class="label" x="672" y="649" text-anchor="middle">Tempo</text>
