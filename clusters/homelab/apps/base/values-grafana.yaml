serviceAccount:
  create: true
persistence:
  enabled: true
  storageClassName: nfs-client
  accessModes:
    - ReadWriteOnce
  size: 10Gi
podLabels:
  app.kubernetes.io/name: grafana
  app.kubernetes.io/instance: grafana
  app.kubernetes.io/component: dashboards
  app.kubernetes.io/part-of: observability
service:
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: grafana
    app.kubernetes.io/component: dashboards
    app.kubernetes.io/part-of: observability

sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: observability
    folder: /var/lib/grafana/dashboards
    defaultFolderName: Observability
    searchNamespace: ALL
    provider:
      name: Observability
      orgid: 1
      folder: Observability
      type: file
  datasources:
    enabled: false

alerting:
  mute-timings.yaml:
    apiVersion: 1
    muteTimes:
      - orgId: 1
        name: home-night-0100-0630
        time_intervals:
          - times:
              - start_time: "01:00"
                end_time: "06:30"
            location: Asia/Tokyo
  policies.yaml:
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: grafana-default-email
        group_by:
          - grafana_folder
          - alertname
        routes:
          - receiver: grafana-default-email
            object_matchers:
              - ["scope", "=", "openwrt-security"]
            mute_time_intervals:
              - home-night-0100-0630
            group_wait: 1m
            group_interval: 15m
            repeat_interval: 4h
  rules.yaml:
    apiVersion: 1
    groups:
      - orgId: 1
        name: openwrt-security
        folder: Observability
        interval: 1m
        rules:
          - uid: openwrt_syslog_silence
            title: OpenWrt syslog silence
            condition: B
            data:
              - refId: A
                datasourceUid: loki
                relativeTimeRange:
                  from: 600
                  to: 0
                model:
                  datasource:
                    type: loki
                    uid: loki
                  editorMode: code
                  expr: 'sum(count_over_time({app="openwrt-router"}[10m]))'
                  intervalMs: 1000
                  maxDataPoints: 43200
                  queryType: instant
                  refId: A
              - refId: B
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 1
                        type: lt
                      operator:
                        type: and
                      query:
                        params:
                          - A
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: B
                  type: classic_conditions
            noDataState: Alerting
            execErrState: Error
            for: 10m
            annotations:
              summary: OpenWrt syslog has stopped reaching Loki.
              description: No OpenWrt syslog entries were observed for 10 minutes. Check OpenWrt logd remote forwarding, the OTel syslog LoadBalancer, and Loki ingestion.
            labels:
              severity: warning
              scope: openwrt-security
