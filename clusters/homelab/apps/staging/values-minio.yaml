persistence:
  size: 50Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

buckets:
  - name: stg-loki
    policy: none
    purge: false
  - name: stg-loki-ruler
    policy: none
    purge: false
  - name: stg-mimir-blocks
    policy: none
    purge: false
  - name: stg-mimir-ruler
    policy: none
    purge: false
  - name: stg-mimir-alertmanager
    policy: none
    purge: false

podLabels:
  app.kubernetes.io/name: minio
  app.kubernetes.io/instance: stg-minio
  app.kubernetes.io/part-of: object-storage
  environment: staging

service:
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/instance: stg-minio
    app.kubernetes.io/part-of: object-storage
    environment: staging
