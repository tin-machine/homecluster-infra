---
# Public ARM64 / k3s baseline playbook.
# Real host selection, node IPs, tokens, Wi-Fi secrets, and storage device IDs
# are supplied by the external inventory.

- name: base
  gather_facts: true
  hosts: "env_stg:&role_base"
  tags:
    - base
    - stg_base
  roles:
    - common/base
    - common/change_make_conf
    - common/zram_swap
    - common/run_tmpfs_resize
    - common/wait_network_up
    - common/resolver
    - common/cli_tools
    - role: common/ntp
      tags:
        - ntp
    - common/daemon
    - role: distcc
      tags:
        - distcc
    - common/emerge

- name: workstation_cli
  gather_facts: true
  hosts: "env_stg:&role_workstation_cli"
  tags:
    - workstation_cli
  roles:
    - common/user_add

- name: iSCSI lab initiator
  hosts: "env_stg:&role_base"
  gather_facts: true
  tags:
    - never
    - iscsi_lab
  roles:
    - role: iscsi_lab_initiator

- name: k3s staging storage
  hosts: "env_stg:&role_k3s_stg_storage"
  gather_facts: true
  tags:
    - k3s_stg_storage
    - k3s_local_storage
    - iscsi_stg
  pre_tasks:
    - name: staging storage 対象を stage=stg に限定
      ansible.builtin.assert:
        that:
          - stage | default('') == 'stg'
        fail_msg: "k3s_stg_storage は stage=stg の host だけで実行する"
  roles:
    - role: k3s_iscsi_session
      when: k3s_iscsi_session_enabled | default(false)
    - role: k3s_local_storage
      when: k3s_local_storage_enabled | default(false)

- name: k3s staging server
  hosts: "env_stg:&role_k3s_stg_server"
  gather_facts: true
  tags:
    - k3s_stg
    - k3s_stg_server
  pre_tasks:
    - name: staging server group を単一 active host に限定
      ansible.builtin.assert:
        that:
          - groups['k3s_stg_server'] | default([]) | length == 1
        fail_msg: "k3s_stg_server は active host 1台だけにしてください"
      run_once: true

    - name: staging server 対象を stage=stg に限定
      ansible.builtin.assert:
        that:
          - stage | default('') == 'stg'
        fail_msg: "k3s_stg_server は stage=stg の host だけで実行する"

    - name: staging server k3s 変数を確認
      ansible.builtin.assert:
        that:
          - k3s_build_cluster is defined
          - not (k3s_build_cluster | bool)
          - k3s_control_node is defined
          - k3s_control_node | bool
          - k3s_server is mapping
          - ((k3s_server | default({}))['node-ip'] | default('') | string | length) > 0
          - ((k3s_server | default({}))['node-name'] | default('') | string | length) > 0
        fail_msg: "k3s_stg_server の必須変数は外部 inventory 側で定義してください"

    - name: memory cgroup が有効か確認
      ansible.builtin.command: grep -w memory /sys/fs/cgroup/cgroup.controllers
      changed_when: false

    - name: k3s に必要な kernel module を読み込む
      become: true
      ansible.builtin.command: "modprobe {{ item }}"
      changed_when: false
      loop:
        - br_netfilter
        - overlay
        - vxlan

    - name: k3s 用 sysctl 設定を配置
      become: true
      ansible.builtin.copy:
        dest: /etc/sysctl.d/90-k3s-stg.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          net.ipv4.ip_forward = 1
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1

    - name: k3s 用 sysctl 設定を反映
      become: true
      ansible.builtin.command: sysctl -p /etc/sysctl.d/90-k3s-stg.conf
      changed_when: false

  roles:
    - role: k3s_log_limits
      tags:
        - k3s_log_limits
    - role: k3s_iptables_nft
      tags:
        - k3s_iptables_nft
    - role: k3s_iscsi_session
      tags:
        - iscsi_stg
        - k3s_iscsi_session
      when: k3s_iscsi_session_enabled | default(false)
    - role: k3s_local_storage
      tags:
        - k3s_local_storage
      when: k3s_local_storage_enabled | default(false)
    - role: xanmanning.k3s
    - role: k3s_networking
      tags:
        - k3s_networking

- name: k3s observability terraform apply
  hosts: "env_stg:&role_terraform_stg"
  gather_facts: true
  tags:
    - terraform_stg
    - k3s_observability_apply
  pre_tasks:
    - name: terraform staging 対象を stage=stg に限定
      ansible.builtin.assert:
        that:
          - stage | default('') == 'stg'
        fail_msg: "terraform_stg は stage=stg の host だけで実行する"
  roles:
    - role: k3s_observability_apply

- name: k3s staging registry config
  hosts: "env_stg:&k3s_stg"
  gather_facts: true
  tags:
    - k3s_registry
  roles:
    - role: k3s_registries

- name: k3s staging agents
  hosts: "env_stg:&k3s_stg"
  gather_facts: true
  tags:
    - k3s_stg
    - k3s_stg_agents
  pre_tasks:
    - name: agent join 先を単一 staging server に限定
      ansible.builtin.assert:
        that:
          - groups['k3s_stg_server'] | default([]) | length == 1
        fail_msg: "k3s_stg_server は active host 1台だけにしてください"
      run_once: true
      when: not (k3s_stg_agent_pull_mode | bool)

    - name: staging server k3s version を取得
      ansible.builtin.command:
        argv:
          - /usr/local/bin/k3s
          - --version
      register: k3s_server_version_cmd
      changed_when: false
      delegate_to: "{{ k3s_stg_server_host | default('localhost', true) }}"
      run_once: true
      when: k3s_stg_server_hosts | length > 0

    - name: staging server k3s version を fact 化
      ansible.builtin.set_fact:
        k3s_server_release_version: "{{ k3s_server_version_cmd.stdout | regex_search('v[0-9]+\\.[0-9]+\\.[0-9]+\\+k3s[0-9]+') }}"
      delegate_to: "{{ k3s_stg_server_host | default('localhost', true) }}"
      delegate_facts: true
      run_once: true
      when: k3s_stg_server_hosts | length > 0

    - name: staging agent join に必要な値を確認
      ansible.builtin.assert:
        that:
          - stage | default('') == 'stg'
          - k3s_registration_address | default('') | length > 0
          - k3s_control_token | default('') | length > 0
        fail_msg: "stage=stg、k3s_registration_address、k3s_control_token を外部 inventory または実行時変数で渡してください"
      no_log: true
      when: inventory_hostname in (groups['k3s_stg_agents'] | default([]))

    - name: k3s server API を待つ
      become: false
      vars:
        ansible_become: false
      ansible.builtin.wait_for:
        host: "{{ k3s_registration_address }}"
        port: 6443
        timeout: 300
      delegate_to: localhost
      when: inventory_hostname in (groups['k3s_stg_agents'] | default([]))

  roles:
    - role: k3s_log_limits
      when: inventory_hostname in (groups['k3s_stg_agents'] | default([]))
      tags:
        - k3s_log_limits
    - role: k3s_iptables_nft
      when: inventory_hostname in (groups['k3s_stg_agents'] | default([]))
      tags:
        - k3s_iptables_nft
    - role: k3s_iscsi_session
      tags:
        - iscsi_stg
        - k3s_iscsi_session
      when:
        - inventory_hostname in (groups['k3s_stg_agents'] | default([]))
        - k3s_iscsi_session_enabled | default(false)
    - role: k3s_local_storage
      tags:
        - k3s_local_storage
      when:
        - inventory_hostname in (groups['k3s_stg_agents'] | default([]))
        - k3s_local_storage_enabled | default(false)
    - role: xanmanning.k3s
      when: inventory_hostname in (groups['k3s_stg_agents'] | default([]))
      vars:
        k3s_state: installed
        k3s_release_version: "{{ hostvars[k3s_stg_server_host].k3s_server_release_version if (k3s_stg_server_host | length > 0) else false }}"
        k3s_control_node: false
        k3s_primary_control_node: false
        k3s_build_cluster: true
        k3s_control_delegate: "{{ k3s_stg_server_host if (k3s_stg_server_host | length > 0) else 'k3s_stg_server' }}"
        k3s_service_name: k3s
        k3s_defer_service_restart: true
    - role: k3s_networking
      when: inventory_hostname in (groups['k3s_stg_agents'] | default([]))
      vars:
        k3s_control_node: false
        k3s_service_name: k3s
        k3s_defer_service_restart: true
      tags:
        - k3s_networking
    - role: rpi5_egpu_local_llm
      when: inventory_hostname in (groups['k3s_stg_agents'] | default([])) and rpi5_egpu_local_llm_enabled | default(false) | bool
      tags:
        - rpi5_egpu_local_llm
  vars:
    k3s_stg_server_hosts: "{{ groups['k3s_stg_server'] | default([]) }}"
    k3s_stg_server_host: "{{ (groups['k3s_stg_server'] | default([]) | first) | default('', true) }}"
    k3s_stg_agent_pull_mode: >-
      {{
        (groups['k3s_stg_server'] | default([]) | length == 0)
        and ((k3s_registration_address | default('') | string | length) > 0)
        and ((k3s_control_token | default('') | string | length) > 0)
      }}
