---
- name: "k3s_converge check-only"
  ansible.builtin.assert:
    that:
      - k3s_converge_check_node_role in ['agent', 'server']
      - k3s_converge_check_install_path | length > 0
      - k3s_converge_check_compat_install_path | length > 0
      - k3s_converge_check_mountpoint | length > 0
      - k3s_converge_check_service_name | length > 0
      - k3s_converge_check_mode in ['check-only', 'start']
  when:
    - k3s_converge_check_enabled | bool
    - inventory_hostname in ((groups['k3s_stg_agents'] | default([])) + (groups['k3s_stg_server'] | default([])))

- name: Install k3s_converge_check helper
  ansible.builtin.copy:
    src: k3s-converge
    dest: "{{ k3s_converge_check_install_path }}"
    mode: '0755'
  when:
    - k3s_converge_check_enabled | bool
    - inventory_hostname in ((groups['k3s_stg_agents'] | default([])) + (groups['k3s_stg_server'] | default([])))

- name: Install k3s_converge_check compatibility symlink
  ansible.builtin.file:
    src: "{{ k3s_converge_check_install_path }}"
    dest: "{{ k3s_converge_check_compat_install_path }}"
    state: link
    force: true
  when:
    - k3s_converge_check_enabled | bool
    - inventory_hostname in ((groups['k3s_stg_agents'] | default([])) + (groups['k3s_stg_server'] | default([])))

- name: Run k3s_converge helper
  ansible.builtin.command:
    argv:
      - "{{ k3s_converge_check_install_path }}"
      - "{{ '--start' if k3s_converge_check_mode == 'start' else '--check-only' }}"
      - --mountpoint
      - "{{ k3s_converge_check_mountpoint }}"
      - --service
      - "{{ k3s_converge_check_service_name }}"
      - --node-role
      - "{{ k3s_converge_check_node_role }}"
  register: k3s_converge_check_run
  changed_when: "'k3s-converge: service started' in k3s_converge_check_run.stdout"
  when:
    - k3s_converge_check_enabled | bool
    - inventory_hostname in ((groups['k3s_stg_agents'] | default([])) + (groups['k3s_stg_server'] | default([])))
