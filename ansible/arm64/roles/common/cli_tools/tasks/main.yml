---

- name: package.unmask の確認
  command: cat /etc/portage/package.unmask
  register: unmask_result
  check_mode: false
  changed_when: false
  failed_when: false

- name: package.accept_keywordsディレクトリ作成
  become: true
  ansible.builtin.file:
    path: /etc/portage/package.accept_keywords
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: package.accept_keywords の存在確認
  ansible.builtin.stat:
    path: /etc/portage/package.accept_keywords/package.accept_keywords
  register: accept_keywords_stat
  changed_when: false

- name: kubectl を ~arm64 で許可
  become: true
  ansible.builtin.lineinfile:
    path: /etc/portage/package.accept_keywords/kubectl
    line: "sys-cluster/kubectl ~arm64"
    regexp: "^sys-cluster/kubectl\\s"
    state: present
    create: true
    owner: root
    group: root
    mode: "0644"

# 必要なら内容の取得（※バイナリ安全）
- name: package.accept_keywords の内容取得（必要な場合のみ）
  ansible.builtin.slurp:
    path: /etc/portage/package.accept_keywords/package.accept_keywords
  register: accept_keywords_slurp
  when: accept_keywords_stat.stat.exists
  changed_when: false

- name: /etc/portage/env を作成
  become: true
  ansible.builtin.file:
    path: /etc/portage/env
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: distcc 用のスタブを配置
  become: true
  ansible.builtin.copy:
    dest: /etc/portage/env/enable-distcc
    owner: root
    group: root
    mode: "0644"
    content: |
      # Generated by ansible common/cli_tools
      FEATURES="${FEATURES} distcc"

- name: シンプルなアプリ追加
  become: true
  community.general.portage:
    package: "{{ item }}"
    state: present
    loadavg: 5
  loop:
    - app-admin/logrotate
    - net-analyzer/netcat
    - net-dns/bind-tools
    - app-editors/neovim
    - app-misc/jq
    - app-misc/tmux
    - app-shells/fish
    - app-vim/vim-tmux
    - app-portage/gentoolkit
    - dev-vcs/git
    - sys-apps/ripgrep
    - sys-cluster/kubectl
    - net-wireless/iw
  register: cli_tools_simple_packages_result
  ignore_errors: true
  loop_control:
    label: "{{ item }}"
  tags:
    - cli_tools
    - cli_tools_simple

- name: シンプルなアプリの失敗を集計
  ansible.builtin.set_fact:
    portage_failed_packages: "{{ portage_failed_packages | default([]) + (cli_tools_simple_packages_result.results | selectattr('failed', 'defined') | selectattr('failed') | map(attribute='item') | list) }}"
  when: cli_tools_simple_packages_result is defined
    # - app-portage/flaggie

# pkgdevは一時的にビルドに失敗するのでコメントアウト
#    - dev-util/pkgdev
# ansibleは大きいので一時的に除外
#    - app-admin/ansible

- name: 開発版を許可するインストール
  vars:
    package_list:
      - app-shells/fzf
  block:
    - name: package.accept_keywords ディレクトリ作成
      ansible.builtin.file:
        path: /etc/portage/package.accept_keywords
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: package.accept_keywords 配下にファイルを置く（~arch を許可）
      ansible.builtin.lineinfile:
        path: "/etc/portage/package.accept_keywords/{{ item | basename }}"
        line: "{{ item }} **"
        regexp: "^{{ item | regex_escape }} .*$"
        state: present
        create: true
        owner: root
        group: root
        mode: "0644"
      loop: "{{ package_list }}"

    - name: パッケージをインストール（マッピング形式）
      community.general.portage:
        package: "{{ item }}"
        state: present
        loadavg: 5
      loop: "{{ package_list }}"
      register: cli_tools_dev_packages_result
      ignore_errors: true
      loop_control:
        label: "{{ item }}"

    - name: 開発版インストール失敗を集計
      ansible.builtin.set_fact:
        portage_failed_packages: "{{ portage_failed_packages | default([]) + (cli_tools_dev_packages_result.results | selectattr('failed', 'defined') | selectattr('failed') | map(attribute='item') | list) }}"
      when: cli_tools_dev_packages_result is defined

- name: portage インストール失敗リストを表示
  ansible.builtin.debug:
    var: portage_failed_packages
  when: portage_failed_packages | default([]) | length > 0
