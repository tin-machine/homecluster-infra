---
- name: Reload systemd for PicoClaw
  become: true
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart PicoClaw gateway
  become: true
  ansible.builtin.systemd:
    name: picoclaw-gateway.service
    state: restarted
  when: picoclaw_common_effective_service_enabled | default(false) | bool
