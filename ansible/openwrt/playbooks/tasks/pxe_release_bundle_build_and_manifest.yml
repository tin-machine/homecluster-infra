---
- name: PXE release bundle release を build
  ansible.builtin.include_role:
    name: openwrt_gentoo_rootfs
  loop: "{{ pxe_release_bundle_build_items }}"
  loop_control:
    loop_var: pxe_release_bundle_build_item
    label: "{{ pxe_release_bundle_build_item.name }}={{ pxe_release_bundle_build_item.release }}"
  vars:
    openwrt_gentoo_release: "{{ pxe_release_bundle_build_item.release }}"
    openwrt_gentoo_release_bundle_enabled: true
    openwrt_gentoo_release_bundle_date: "{{ pxe_release_bundle_effective_date }}"
    openwrt_gentoo_release_bundle_generations: "{{ pxe_release_bundle_effective_generations }}"
    openwrt_gentoo_release_bundle_policy: paired_clean
    openwrt_gentoo_release_bundle_strict_hosts: false
    openwrt_gentoo_release_bundle_require_artifacts: false
    openwrt_gentoo_release_bundle_manifest_enabled: false
    openwrt_gentoo_rootfs_target_stages: []
    openwrt_gentoo_rootfs_include_base_candidate: true
    openwrt_gentoo_rootfs_candidate_fallback_to_base: true
    openwrt_pxe_hosts: []
    openwrt_pxe_hosts_effective_override: []
    openwrt_pxe_boots_effective_override: []
  when: not (pxe_release_bundle_skip_build | default(false) | bool)
  tags:
    - pxe_release_bundle
    - pxe_release_bundle_build

- name: PXE release bundle manifest metadata の基底値を準備
  ansible.builtin.set_fact:
    pxe_release_bundle_manifest_metadata_base: "{{ openwrt_gentoo_release_bundle_manifest_metadata | default({}) }}"
  tags:
    - pxe_release_bundle
    - pxe_release_bundle_build

- name: rpi5 eGPU generation build の対象 release を解決
  ansible.builtin.set_fact:
    pxe_release_bundle_rpi5_items: >-
      {{
        pxe_release_bundle_build_items
        | selectattr('name', 'equalto', 'rpi5')
        | list
      }}
  when: openwrt_rpi5_egpu_generation_enabled | default(false) | bool
  tags:
    - pxe_release_bundle
    - pxe_release_bundle_build

- name: rpi5 eGPU generation build 入力を検証
  ansible.builtin.assert:
    that:
      - pxe_release_bundle_rpi5_items | length == 1
      - openwrt_rpi5_egpu_generation_apply | default(false) | bool
      - openwrt_rpi5_egpu_generation_manifest_metadata is mapping
      - openwrt_rpi5_egpu_generation_manifest_metadata.kernel_release | default('', true) | string | trim | length > 0
      - openwrt_rpi5_egpu_generation_manifest_metadata.nvidia_driver_version | default('', true) | string | trim | length > 0
      - openwrt_rpi5_egpu_generation_manifest_metadata.nvidia_runfile_sha256 | default('', true) | string | trim | length == 64
      - openwrt_rpi5_egpu_generation_manifest_metadata.open_kernel_modules_commit | default('', true) | string | trim | length >= 12
      - openwrt_rpi5_egpu_generation_manifest_metadata.icd_path | default('', true) | string | trim | length > 0
      - openwrt_rpi5_egpu_generation_manifest_metadata.icd_sha256 | default('', true) | string | trim | length == 64
      - openwrt_rpi5_egpu_generation_manifest_metadata.llama_cpp_revision | default('', true) | string | trim | length >= 12
    fail_msg: >-
      rpi5 eGPU generation build には rpi5 release、apply opt-in、および kernel / NVIDIA / ICD /
      llama.cpp provenance を含む non-secret manifest metadata が必要です。
  when: openwrt_rpi5_egpu_generation_enabled | default(false) | bool
  tags:
    - pxe_release_bundle
    - pxe_release_bundle_build

- name: rpi5 eGPU generation artifact bundle 入力を検証
  ansible.builtin.assert:
    that:
      - openwrt_rpi5_egpu_generation_artifact_archive_path is match('^/var/lib/rancher/k3s/')
      - openwrt_rpi5_egpu_generation_artifact_archive_sha256_path is match('^/var/lib/rancher/k3s/')
      - openwrt_rpi5_egpu_generation_artifact_source_host | length > 0
    fail_msg: "rpi5 eGPU generation artifact bundle の source host / archive / checksum path を確認してください"
  when:
    - openwrt_rpi5_egpu_generation_enabled | default(false) | bool
    - openwrt_rpi5_egpu_generation_artifact_bundle_enabled | default(false) | bool
  tags:
    - pxe_release_bundle
    - pxe_release_bundle_build

- name: rpi5 eGPU generation artifact bundle staging defaults を補完
  ansible.builtin.set_fact:
    openwrt_rpi5_egpu_generation_artifact_controller_dir: >-
      {{
        openwrt_rpi5_egpu_generation_artifact_controller_dir
        | default('/tmp/rpi5-egpu-generation-artifacts', true)
      }}
    openwrt_rpi5_egpu_generation_artifact_openwrt_dir: >-
      {{
        openwrt_rpi5_egpu_generation_artifact_openwrt_dir
        | default('/srv/gentoo/rpi5-egpu-artifacts', true)
      }}
  when:
    - openwrt_rpi5_egpu_generation_enabled | default(false) | bool
    - openwrt_rpi5_egpu_generation_artifact_bundle_enabled | default(false) | bool
  tags:
    - pxe_release_bundle
    - pxe_release_bundle_build

- name: rpi5 eGPU generation artifact controller staging directory を作成
  ansible.builtin.file:
    path: "{{ openwrt_rpi5_egpu_generation_artifact_controller_dir }}/{{ pxe_release_bundle_rpi5_items[0].release }}"
    state: directory
    mode: '0700'
  delegate_to: localhost
  become: false
  when:
    - openwrt_rpi5_egpu_generation_enabled | default(false) | bool
    - openwrt_rpi5_egpu_generation_artifact_bundle_enabled | default(false) | bool
  tags:
    - pxe_release_bundle
    - pxe_release_bundle_build

- name: rpi5 eGPU generation artifact archive を controller へ取得
  ansible.builtin.fetch:
    src: "{{ openwrt_rpi5_egpu_generation_artifact_archive_path }}"
    dest: "{{ openwrt_rpi5_egpu_generation_artifact_controller_dir }}/{{ pxe_release_bundle_rpi5_items[0].release }}/"
    flat: true
    validate_checksum: true
  delegate_to: "{{ openwrt_rpi5_egpu_generation_artifact_source_host }}"
  when:
    - openwrt_rpi5_egpu_generation_enabled | default(false) | bool
    - openwrt_rpi5_egpu_generation_artifact_bundle_enabled | default(false) | bool
  tags:
    - pxe_release_bundle
    - pxe_release_bundle_build

- name: rpi5 eGPU generation artifact checksum manifest を controller へ取得
  ansible.builtin.fetch:
    src: "{{ openwrt_rpi5_egpu_generation_artifact_archive_sha256_path }}"
    dest: "{{ openwrt_rpi5_egpu_generation_artifact_controller_dir }}/{{ pxe_release_bundle_rpi5_items[0].release }}/"
    flat: true
    validate_checksum: true
  delegate_to: "{{ openwrt_rpi5_egpu_generation_artifact_source_host }}"
  when:
    - openwrt_rpi5_egpu_generation_enabled | default(false) | bool
    - openwrt_rpi5_egpu_generation_artifact_bundle_enabled | default(false) | bool
  tags:
    - pxe_release_bundle
    - pxe_release_bundle_build

- name: rpi5 eGPU generation artifact archive checksum を controller で検証
  ansible.builtin.shell: |
    set -euo pipefail
    dir="{{ openwrt_rpi5_egpu_generation_artifact_controller_dir }}/{{ pxe_release_bundle_rpi5_items[0].release }}"
    archive="$dir/{{ openwrt_rpi5_egpu_generation_artifact_archive_path | basename }}"
    manifest="$dir/{{ openwrt_rpi5_egpu_generation_artifact_archive_sha256_path | basename }}"
    expected="$(awk 'NR == 1 { print $1 }' "$manifest")"
    actual="$(sha256sum "$archive" | awk '{ print $1 }')"
    test -n "$expected"
    test "$expected" = "$actual"
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  changed_when: false
  when:
    - openwrt_rpi5_egpu_generation_enabled | default(false) | bool
    - openwrt_rpi5_egpu_generation_artifact_bundle_enabled | default(false) | bool
  tags:
    - pxe_release_bundle
    - pxe_release_bundle_build

- name: rpi5 eGPU generation artifact OpenWrt staging directory を作成
  ansible.builtin.file:
    path: "{{ openwrt_rpi5_egpu_generation_artifact_openwrt_dir }}/{{ pxe_release_bundle_rpi5_items[0].release }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  when:
    - openwrt_rpi5_egpu_generation_enabled | default(false) | bool
    - openwrt_rpi5_egpu_generation_artifact_bundle_enabled | default(false) | bool
  tags:
    - pxe_release_bundle
    - pxe_release_bundle_build

- name: rpi5 eGPU generation artifact archive を OpenWrt へ展開
  ansible.builtin.unarchive:
    src: "{{ openwrt_rpi5_egpu_generation_artifact_controller_dir }}/{{ pxe_release_bundle_rpi5_items[0].release }}/{{ openwrt_rpi5_egpu_generation_artifact_archive_path | basename }}"
    dest: "{{ openwrt_rpi5_egpu_generation_artifact_openwrt_dir }}/{{ pxe_release_bundle_rpi5_items[0].release }}"
    owner: root
    group: root
    mode: '0755'
  when:
    - openwrt_rpi5_egpu_generation_enabled | default(false) | bool
    - openwrt_rpi5_egpu_generation_artifact_bundle_enabled | default(false) | bool
  tags:
    - pxe_release_bundle
    - pxe_release_bundle_build

- name: rpi5 eGPU generation artifact payload checksum を OpenWrt で検証
  ansible.builtin.command:
    argv:
      - /bin/sh
      - -lc
      - "cd {{ openwrt_rpi5_egpu_generation_artifact_openwrt_dir }}/{{ pxe_release_bundle_rpi5_items[0].release }}/payload && sha256sum -c ../manifest.sha256"
  changed_when: false
  when:
    - openwrt_rpi5_egpu_generation_enabled | default(false) | bool
    - openwrt_rpi5_egpu_generation_artifact_bundle_enabled | default(false) | bool
  tags:
    - pxe_release_bundle
    - pxe_release_bundle_build

- name: rpi5 eGPU generation kernel modules を target rootfs へ配置
  ansible.builtin.shell: |
    set -euo pipefail
    stage="{{ openwrt_rpi5_egpu_generation_artifact_openwrt_dir }}/{{ pxe_release_bundle_rpi5_items[0].release }}/payload"
    root="/srv/gentoo/{{ pxe_release_bundle_rpi5_items[0].release }}/nfs"
    kver="{{ openwrt_rpi5_egpu_runtime_repair_kernel_version }}"
    test -d "$stage/modules/lib/modules/$kver"
    mkdir -p "$root/lib/modules"
    rm -rf "$root/lib/modules/$kver"
    cp -a "$stage/modules/lib/modules/$kver" "$root/lib/modules/"
  args:
    executable: /bin/bash
  changed_when: true
  when:
    - openwrt_rpi5_egpu_generation_enabled | default(false) | bool
    - openwrt_rpi5_egpu_generation_artifact_bundle_enabled | default(false) | bool
  tags:
    - pxe_release_bundle
    - pxe_release_bundle_build

- name: rpi5 eGPU generation kernel image と DTB を target TFTP へ配置
  ansible.builtin.copy:
    src: "{{ openwrt_rpi5_egpu_generation_artifact_openwrt_dir }}/{{ pxe_release_bundle_rpi5_items[0].release }}/payload/{{ item.src }}"
    dest: "/srv/gentoo/tftp-root/dates/{{ pxe_release_bundle_rpi5_items[0].release }}/{{ item.dest }}"
    owner: root
    group: root
    mode: '0644'
    remote_src: true
  loop:
    - src: kernel8-nvidia.img
      dest: kernel8-nvidia.img
    - src: bcm2712-rpi-5-b-nvidia.dtb
      dest: bcm2712-rpi-5-b-nvidia.dtb
  when:
    - openwrt_rpi5_egpu_generation_enabled | default(false) | bool
    - openwrt_rpi5_egpu_generation_artifact_bundle_enabled | default(false) | bool
  tags:
    - pxe_release_bundle
    - pxe_release_bundle_build

- name: rpi5 eGPU generation runtime input の実効 path を設定
  ansible.builtin.set_fact:
    pxe_rpi5_egpu_generation_runfile_path_effective: >-
      {{
        openwrt_rpi5_egpu_generation_artifact_openwrt_dir ~ '/' ~ pxe_release_bundle_rpi5_items[0].release ~ '/payload/NVIDIA-Linux-aarch64.run'
        if (openwrt_rpi5_egpu_generation_artifact_bundle_enabled | default(false) | bool)
        else openwrt_rpi5_egpu_runtime_repair_nvidia_runfile_path
      }}
    pxe_rpi5_egpu_generation_open_modules_path_effective: >-
      {{
        openwrt_rpi5_egpu_generation_artifact_openwrt_dir ~ '/' ~ pxe_release_bundle_rpi5_items[0].release ~ '/payload/open-gpu-kernel-modules'
        if (openwrt_rpi5_egpu_generation_artifact_bundle_enabled | default(false) | bool)
        else openwrt_rpi5_egpu_runtime_repair_open_kernel_modules_source_dir
      }}
    pxe_rpi5_egpu_generation_kernel_build_path_effective: >-
      {{
        openwrt_rpi5_egpu_generation_artifact_openwrt_dir ~ '/' ~ pxe_release_bundle_rpi5_items[0].release ~ '/payload/linux'
        if (openwrt_rpi5_egpu_generation_artifact_bundle_enabled | default(false) | bool)
        else openwrt_rpi5_egpu_runtime_repair_kernel_build_dir
      }}
  when: openwrt_rpi5_egpu_generation_enabled | default(false) | bool
  tags:
    - pxe_release_bundle
    - pxe_release_bundle_build

- name: rpi5 eGPU target generation の lower-rootfs runtime を構築
  ansible.builtin.include_role:
    name: openwrt_rpi5_egpu_runtime_repair
  vars:
    openwrt_rpi5_egpu_runtime_repair_enabled: true
    openwrt_rpi5_egpu_runtime_repair_apply: "{{ openwrt_rpi5_egpu_generation_apply | bool }}"
    openwrt_rpi5_egpu_runtime_repair_validate: true
    openwrt_rpi5_egpu_runtime_repair_target_rootfs: "/srv/gentoo/{{ pxe_release_bundle_rpi5_items[0].release }}/nfs"
    openwrt_rpi5_egpu_runtime_repair_use_staged_source_rootfs: false
    openwrt_rpi5_egpu_runtime_repair_nvidia_runfile_path: "{{ pxe_rpi5_egpu_generation_runfile_path_effective }}"
    openwrt_rpi5_egpu_runtime_repair_open_kernel_modules_source_dir: "{{ pxe_rpi5_egpu_generation_open_modules_path_effective }}"
    openwrt_rpi5_egpu_runtime_repair_kernel_build_dir: "{{ pxe_rpi5_egpu_generation_kernel_build_path_effective }}"
  when: openwrt_rpi5_egpu_generation_enabled | default(false) | bool
  tags:
    - pxe_release_bundle
    - pxe_release_bundle_build

- name: rpi5 eGPU target generation の NVIDIA initramfs を再生成
  ansible.builtin.include_role:
    name: openwrt_gentoo_rootfs
    tasks_from: initramfs
  vars:
    openwrt_gentoo_initramfs_enabled: true
    openwrt_gentoo_initramfs_force_build: true
    openwrt_gentoo_initramfs_builds:
      - name: rpi5-v8-nvidia
        rootfs_release: "{{ pxe_release_bundle_rpi5_items[0].release }}"
        tftp_release: "{{ pxe_release_bundle_rpi5_items[0].release }}"
        output_path: /boot/initramfs-pxe-v8-nvidia.img
        tftp_path: initramfs-pxe-v8-nvidia.img
        kernel_version: "{{ openwrt_rpi5_egpu_runtime_repair_kernel_version }}"
  when: openwrt_rpi5_egpu_generation_enabled | default(false) | bool
  tags:
    - pxe_release_bundle
    - pxe_release_bundle_build

- name: PXE release bundle artifact と manifest を検証
  ansible.builtin.include_role:
    name: openwrt_gentoo_rootfs
    tasks_from: release_bundle
  vars:
    openwrt_gentoo_release_bundle_enabled: true
    openwrt_gentoo_release_bundle_date: "{{ pxe_release_bundle_effective_date }}"
    openwrt_gentoo_release_bundle_generations: "{{ pxe_release_bundle_effective_generations }}"
    openwrt_gentoo_release_bundle_policy: paired_clean
    openwrt_gentoo_release_bundle_strict_hosts: false
    openwrt_gentoo_release_bundle_require_artifacts: true
    openwrt_gentoo_release_bundle_manifest_enabled: true
    openwrt_gentoo_release_bundle_manifest_metadata: >-
      {{
        pxe_release_bundle_manifest_metadata_base
        | combine(
          {'rpi5_nvidia': openwrt_rpi5_egpu_generation_manifest_metadata | default({})}
          if (openwrt_rpi5_egpu_generation_enabled | default(false) | bool)
          else {}
        )
      }}
  tags:
    - pxe_release_bundle
    - pxe_release_bundle_build
