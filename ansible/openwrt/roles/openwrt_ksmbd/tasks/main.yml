---
- name: ksmbd 無効化時は設定をスキップ
  ansible.builtin.debug:
    msg: "openwrt_ksmbd_enabled=false のため ksmbd は設定しません"
  when: not (openwrt_ksmbd_enabled | bool)

- name: ksmbd を設定
  when: openwrt_ksmbd_enabled | bool
  block:
    - name: ksmbd 共通変数を検証
      ansible.builtin.assert:
        that:
          - openwrt_ksmbd_packages | length > 0
          - openwrt_ksmbd_service_name | string | length > 0
          - openwrt_ksmbd_workgroup | string | length > 0
          - openwrt_ksmbd_description | string | length > 0
          - openwrt_ksmbd_interface | string | length > 0
          - openwrt_ksmbd_shares | length > 0
          - openwrt_ksmbd_users | length > 0
          - openwrt_firewall_allow_smb | default(false) | bool
        fail_msg: >-
          ksmbd を有効化する場合は authenticated share、account、LAN TCP/445 firewall opt-in を
          外部 inventory で定義してください

    - name: ksmbd account 定義を検証
      ansible.builtin.assert:
        that:
          - (item.name | default('') | string) is match('^[A-Za-z0-9_.-]+$')
          - item.password is defined
          - item.password | string | length > 0
        fail_msg: "openwrt_ksmbd_users の各要素に安全な name と外部注入 password が必要です"
      loop: "{{ openwrt_ksmbd_users }}"
      loop_control:
        label: "{{ item.name | default('undefined') }}"
      no_log: true

    - name: ksmbd share 定義を検証
      ansible.builtin.assert:
        that:
          - (item.name | default('') | string) is match('^[A-Za-z0-9_.-]+$')
          - (item.path | default('') | string) is match('^/[^\r\n]+$')
          - (item.read_only | default('yes') | string) in ['yes', 'no']
          - (item.guest_ok | default('no') | string) in ['yes', 'no']
          - not (openwrt_ksmbd_require_authenticated_shares | bool) or (item.guest_ok | default('no') | string) == 'no'
          - not (openwrt_ksmbd_require_authenticated_shares | bool) or (item.users | default('') | string | length) > 0
        fail_msg: >-
          openwrt_ksmbd_shares の各要素に name/path/access policy が必要です。
          authenticated share policy では guest_ok=no と users が必須です
      loop: "{{ openwrt_ksmbd_shares }}"
      loop_control:
        label: "{{ item.name | default(item.path | default('undefined')) }}"

    - name: ksmbd 関連パッケージを導入
      ansible.builtin.include_role:
        name: openwrt_package
      vars:
        openwrt_package_names: "{{ openwrt_ksmbd_packages }}"
        openwrt_package_state: present
        openwrt_package_update_cache: "{{ openwrt_opkg_update | default(true) }}"

    - name: ksmbd 共有ディレクトリを確認
      ansible.builtin.stat:
        path: "{{ item.path }}"
      register: openwrt_ksmbd_share_paths
      loop: "{{ openwrt_ksmbd_shares }}"
      loop_control:
        label: "{{ item.path }}"

    - name: ksmbd 共有ディレクトリが存在するか確認
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.isdir
        fail_msg: "ksmbd share path {{ item.item.path }} が存在しません"
      loop: "{{ openwrt_ksmbd_share_paths.results | default([]) }}"
      loop_control:
        label: "{{ item.item.path }}"
      when: not ansible_check_mode

    - name: ksmbd 認証accountを登録
      ansible.builtin.command:
        argv:
          - ksmbd.adduser
          - -p
          - "{{ item.password }}"
          - "{{ item.name }}"
      loop: "{{ openwrt_ksmbd_users }}"
      loop_control:
        label: "{{ item.name }}"
      no_log: true
      changed_when: false
      when: not ansible_check_mode

    - name: /etc/config/ksmbd を配置
      ansible.builtin.template:
        src: ksmbd.j2
        dest: /etc/config/ksmbd
        owner: root
        group: root
        mode: "0644"
      notify: Restart ksmbd

    - name: ksmbd service を有効化
      ansible.builtin.shell: |
        if /etc/init.d/{{ openwrt_ksmbd_service_name }} enabled; then
          exit 0
        fi
        /etc/init.d/{{ openwrt_ksmbd_service_name }} enable
        echo changed
      args:
        executable: /bin/ash
      register: openwrt_ksmbd_enable
      changed_when: "'changed' in openwrt_ksmbd_enable.stdout"
      when: not ansible_check_mode

    - name: ksmbd service を起動
      ansible.builtin.shell: |
        if /etc/init.d/{{ openwrt_ksmbd_service_name }} status >/dev/null 2>&1; then
          exit 0
        fi
        /etc/init.d/{{ openwrt_ksmbd_service_name }} start
        echo changed
      args:
        executable: /bin/ash
      register: openwrt_ksmbd_start
      changed_when: "'changed' in openwrt_ksmbd_start.stdout"
      when: not ansible_check_mode

    - name: ksmbd handler を適用
      ansible.builtin.meta: flush_handlers

    - name: ksmbd service 状態を確認
      ansible.builtin.command: "/etc/init.d/{{ openwrt_ksmbd_service_name }} status"
      changed_when: false
      when: not ansible_check_mode

    - name: ksmbd TCP/445 listener を確認
      ansible.builtin.shell: |
        set -eu
        if command -v ss >/dev/null 2>&1; then
          ss -lnt
        elif command -v netstat >/dev/null 2>&1; then
          netstat -lnt
        else
          echo 'ss/netstat is unavailable' >&2
          exit 1
        fi | grep -Eq '(^|[^0-9])445([[:space:]]|$)'
      args:
        executable: /bin/ash
      changed_when: false
      when:
        - not ansible_check_mode
        - openwrt_ksmbd_validate_listener | bool
