---
- name: rpi5 eGPU lower-rootfs chroot の pseudo-filesystem を準備して runtime repair を実行
  block:
    - name: rpi5 eGPU target rootfs dev mountpoint を作成
      ansible.builtin.file:
        path: "{{ openwrt_rpi5_egpu_runtime_repair_target_rootfs_resolved }}/dev"
        state: directory
        mode: '0755'

    - name: rpi5 eGPU target rootfs へ host /dev を recursive bind mount
      ansible.builtin.command:
        argv:
          - /bin/mount
          - -o
          - rbind
          - /dev
          - "{{ openwrt_rpi5_egpu_runtime_repair_target_rootfs_resolved }}/dev"
      changed_when: true

    - name: rpi5 eGPU target rootfs proc mountpoint を作成
      ansible.builtin.file:
        path: "{{ openwrt_rpi5_egpu_runtime_repair_target_rootfs_resolved }}/proc"
        state: directory
        mode: '0755'

    - name: rpi5 eGPU target rootfs へ host /proc を recursive bind mount
      ansible.builtin.command:
        argv:
          - /bin/mount
          - -o
          - rbind
          - /proc
          - "{{ openwrt_rpi5_egpu_runtime_repair_target_rootfs_resolved }}/proc"
      changed_when: true

    - name: rpi5 eGPU target rootfs artifact payload mountpoint を作成
      ansible.builtin.file:
        path: "{{ openwrt_rpi5_egpu_runtime_repair_target_rootfs_resolved }}/.homecluster-rpi5-egpu-artifact"
        state: directory
        mode: '0755'

    - name: rpi5 eGPU target rootfs へ artifact payload を bind mount
      ansible.builtin.command:
        argv:
          - /bin/mount
          - -o
          - bind
          - "{{ openwrt_rpi5_egpu_runtime_repair_nvidia_runfile_path_resolved | dirname }}"
          - "{{ openwrt_rpi5_egpu_runtime_repair_target_rootfs_resolved }}/.homecluster-rpi5-egpu-artifact"
      changed_when: true

    - name: rpi5 eGPU Vulkan packages を target rootfs に導入
      ansible.builtin.command:
        argv:
          - /usr/sbin/chroot
          - "{{ openwrt_rpi5_egpu_runtime_repair_target_rootfs_resolved }}"
          - /bin/bash
          - -lc
          - >-
            emerge {{ openwrt_rpi5_egpu_runtime_repair_emerge_args | join(' ') }}
            {{ openwrt_rpi5_egpu_runtime_repair_vulkan_packages | join(' ') }}
      changed_when: true
      when: openwrt_rpi5_egpu_runtime_repair_install_vulkan_packages | bool

    - name: rpi5 eGPU NVIDIA userspace runfile を target rootfs に導入
      ansible.builtin.command:
        argv:
          - /usr/sbin/chroot
          - "{{ openwrt_rpi5_egpu_runtime_repair_target_rootfs_resolved }}"
          - /bin/bash
          - -lc
          - >-
            /.homecluster-rpi5-egpu-artifact/{{ openwrt_rpi5_egpu_runtime_repair_nvidia_runfile_path_resolved | basename }}
            {{ openwrt_rpi5_egpu_runtime_repair_nvidia_runfile_args | join(' ') }}
            --log-file-name=/var/log/nvidia-installer-{{ openwrt_rpi5_egpu_runtime_repair_nvidia_driver_version_resolved }}.log
      changed_when: true
      when: openwrt_rpi5_egpu_runtime_repair_install_nvidia_userspace | bool

    - name: rpi5 eGPU prebuilt NVIDIA open kernel modules を target rootfs に配置
      ansible.builtin.shell: |
        set -eu
        source="{{ openwrt_rpi5_egpu_runtime_repair_open_kernel_modules_source_dir_resolved }}/kernel-open"
        target="{{ openwrt_rpi5_egpu_runtime_repair_target_rootfs_resolved }}/lib/modules/{{ openwrt_rpi5_egpu_runtime_repair_kernel_version_resolved }}/kernel/drivers/video"
        mkdir -p "$target"
        for module in nvidia.ko nvidia-modeset.ko nvidia-drm.ko nvidia-uvm.ko nvidia-peermem.ko; do
          test -f "$source/$module"
          cp -f "$source/$module" "$target/$module"
        done
      args:
        executable: /bin/ash
      changed_when: true
      when: openwrt_rpi5_egpu_runtime_repair_install_nvidia_kernel_modules | bool

    - name: rpi5 eGPU target rootfs depmod を実行
      ansible.builtin.command:
        argv:
          - /usr/sbin/chroot
          - "{{ openwrt_rpi5_egpu_runtime_repair_target_rootfs_resolved }}"
          - /bin/bash
          - -lc
          - "depmod -a {{ openwrt_rpi5_egpu_runtime_repair_kernel_version_resolved }}"
      changed_when: true
      when: openwrt_rpi5_egpu_runtime_repair_install_nvidia_kernel_modules | bool

  always:
    - name: rpi5 eGPU target rootfs の artifact payload bind mount を解除
      ansible.builtin.command:
        argv:
          - /bin/umount
          - -l
          - "{{ openwrt_rpi5_egpu_runtime_repair_target_rootfs_resolved }}/.homecluster-rpi5-egpu-artifact"
      changed_when: false
      failed_when: false

    - name: rpi5 eGPU target rootfs の artifact payload mountpoint を削除
      ansible.builtin.file:
        path: "{{ openwrt_rpi5_egpu_runtime_repair_target_rootfs_resolved }}/.homecluster-rpi5-egpu-artifact"
        state: absent
      failed_when: false

    - name: rpi5 eGPU target rootfs の host /proc bind mount を解除
      ansible.builtin.command:
        argv:
          - /bin/umount
          - -l
          - "{{ openwrt_rpi5_egpu_runtime_repair_target_rootfs_resolved }}/proc"
      changed_when: false
      failed_when: false

    - name: rpi5 eGPU target rootfs の host /dev bind mount を解除
      ansible.builtin.command:
        argv:
          - /bin/umount
          - -l
          - "{{ openwrt_rpi5_egpu_runtime_repair_target_rootfs_resolved }}/dev"
      changed_when: false
      failed_when: false
