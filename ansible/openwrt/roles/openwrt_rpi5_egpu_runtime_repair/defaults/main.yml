---
# Guarded lower-rootfs NVIDIA/Vulkan repair for a Raspberry Pi 5 eGPU canary.
# Public defaults are intentionally inert. Real target paths, kernel versions,
# runfile paths, and source trees must come from private inventory or an
# operator-gated extra-vars file.

openwrt_rpi5_egpu_runtime_repair_enabled: false
openwrt_rpi5_egpu_runtime_repair_apply: false
openwrt_rpi5_egpu_runtime_repair_validate: true

# A release-bundle build may opt into this role only after the target rpi5
# rootfs exists. Keep it separate from the emergency repair entrypoint: both
# flags are required before a generation build can mutate a lower rootfs.
openwrt_rpi5_egpu_generation_enabled: false
openwrt_rpi5_egpu_generation_apply: false
openwrt_rpi5_egpu_generation_manifest_metadata: {}
openwrt_rpi5_egpu_generation_artifact_bundle_enabled: false
openwrt_rpi5_egpu_generation_artifact_source_host: rpi5-03
openwrt_rpi5_egpu_generation_artifact_archive_path: ""
openwrt_rpi5_egpu_generation_artifact_archive_sha256_path: ""
openwrt_rpi5_egpu_generation_artifact_controller_dir: /tmp/rpi5-egpu-generation-artifacts
openwrt_rpi5_egpu_generation_artifact_openwrt_dir: /srv/gentoo/rpi5-egpu-artifacts

openwrt_rpi5_egpu_runtime_repair_confirm: ""
openwrt_rpi5_egpu_runtime_repair_confirm_expected: ""

openwrt_rpi5_egpu_runtime_repair_target_rootfs: ""
openwrt_rpi5_egpu_runtime_repair_use_staged_source_rootfs: false
openwrt_rpi5_egpu_runtime_repair_source_rootfs: ""
openwrt_rpi5_egpu_runtime_repair_kernel_version: ""

openwrt_rpi5_egpu_runtime_repair_nvidia_driver_version: ""
openwrt_rpi5_egpu_runtime_repair_nvidia_runfile_path: ""
openwrt_rpi5_egpu_runtime_repair_nvidia_runfile_args:
  - --silent
  - --no-kernel-modules
  - --no-nouveau-check
  - --no-x-check
  - --no-questions
  - --accept-license

openwrt_rpi5_egpu_runtime_repair_open_kernel_modules_source_dir: ""
openwrt_rpi5_egpu_runtime_repair_open_kernel_modules_commit: ""
openwrt_rpi5_egpu_runtime_repair_kernel_build_dir: ""

openwrt_rpi5_egpu_runtime_repair_vulkan_packages:
  - media-libs/vulkan-loader
  - dev-util/vulkan-tools
  - dev-util/vulkan-headers
  - dev-util/glslang
  - media-libs/shaderc
  - x11-libs/libX11
  - x11-libs/libXext
  - dev-util/spirv-headers
  - dev-util/spirv-tools
  - x11-libs/libxcb
  - x11-libs/libXau
  - x11-libs/libXdmcp
  - sys-apps/pciutils

openwrt_rpi5_egpu_runtime_repair_emerge_args:
  - --usepkg
  - --changed-use
  - --quiet-build=y

openwrt_rpi5_egpu_runtime_repair_install_vulkan_packages: true
openwrt_rpi5_egpu_runtime_repair_install_nvidia_userspace: true
openwrt_rpi5_egpu_runtime_repair_install_nvidia_kernel_modules: true
