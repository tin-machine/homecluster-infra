      ansible.builtin.file:
        src: "/usr/lib/systemd/system/bluetooth.service"
        dest: "{{ openwrt_gentoo_rootfs_dir }}{{ item }}"
        state: link
        force: true
        follow: false
      loop:
        - /etc/systemd/system/bluetooth.target.wants/bluetooth.service
        - /etc/systemd/system/dbus-org.bluez.service
      when:
