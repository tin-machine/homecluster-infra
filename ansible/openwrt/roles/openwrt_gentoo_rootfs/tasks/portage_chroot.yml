            EXTRA_PKG_ARRAY+=("sys-apps/portage")
          fi
          stale_count=0
          for _pkg in "${STALE_PYTHON_TARGET_PKGS[@]}"; do
            stale_count=$((stale_count + 1))
          done
          extra_count=0
          for _pkg in "${EXTRA_PKG_ARRAY[@]}"; do
            extra_count=$((extra_count + 1))
          done
          if [ "$stale_count" -eq 0 ] && [ "$DEFAULT_PYTHON_PORTAGE_OK" -eq 1 ]; then
            echo "python_target_migration=up-to-date"
            exit 0
          fi
          echo "python_target_migration=merge count=${stale_count} extra=${extra_count} portage_python=${PORTAGE_PYTHON} default_portage_ok=${DEFAULT_PYTHON_PORTAGE_OK}"
          USE="{{ openwrt_gentoo_sudo_use_flags }}" emerge {{ openwrt_gentoo_python_target_migration_emerge_args }} "${STALE_PYTHON_TARGET_PKGS[@]}" "${EXTRA_PKG_ARRAY[@]}"
        '
      args:
        executable: /bin/ash
      changed_when: "'python_target_migration=merge' in (openwrt_gentoo_python_target_migration.stdout | default(''))"
      register: openwrt_gentoo_python_target_migration
      when:
        - openwrt_gentoo_python_target_migration_enabled | bool
      tags:
        - gentoo_packages
