    - name: Gentoo パッケージをインストール (sudo / nfs-utils / openssh / ansible-pull / dracut / rpi-eeprom / rpi-wireless)
      ansible.builtin.shell: |
        set -euo pipefail
        chroot {{ openwrt_gentoo_rootfs_dir }} {{ openwrt_gentoo_chroot_shell }} -lc '
          set -euo pipefail
