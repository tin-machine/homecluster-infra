        - boot_order
        - eeprom_config

    - name: rpi-eeprom config service を rootfs に配置
      ansible.builtin.template:
        src: systemd/rpi-eeprom-boot-order.service.j2
        dest: "{{ openwrt_gentoo_rootfs_dir }}/etc/systemd/system/{{ openwrt_gentoo_rpi_eeprom_service_name }}"
        owner: root
        group: root
        mode: '0644'
      when:
        - openwrt_gentoo_enabled | bool
        - openwrt_gentoo_rpi_eeprom_enabled | bool
      tags:
        - rpi_eeprom
        - firmware
        - boot_order
        - eeprom_config

    - name: rpi-eeprom config service を rootfs で enable
      ansible.builtin.file:
        src: "../{{ openwrt_gentoo_rpi_eeprom_service_name }}"
        dest: "{{ openwrt_gentoo_rootfs_dir }}/etc/systemd/system/multi-user.target.wants/{{ openwrt_gentoo_rpi_eeprom_service_name }}"
        state: link
        force: true
      when:
        - openwrt_gentoo_enabled | bool
        - openwrt_gentoo_rpi_eeprom_enabled | bool
        - openwrt_gentoo_rpi_eeprom_service_enabled | bool
      tags:
        - rpi_eeprom
        - firmware
        - boot_order
        - eeprom_config

    - name: rpi-eeprom auto update script を rootfs に配置
      ansible.builtin.template:
        src: rpi-eeprom-auto-update.sh.j2
        dest: "{{ openwrt_gentoo_rootfs_dir }}{{ openwrt_gentoo_rpi_eeprom_update_script_path }}"
        owner: root
        group: root
        mode: '0755'
      when:
        - openwrt_gentoo_enabled | bool
        - openwrt_gentoo_rpi_eeprom_enabled | bool
      tags:
        - rpi_eeprom
        - firmware
        - eeprom_update

    - name: rpi-eeprom auto update service を rootfs に配置
      ansible.builtin.template:
        src: systemd/rpi-eeprom-auto-update.service.j2
        dest: "{{ openwrt_gentoo_rootfs_dir }}/etc/systemd/system/{{ openwrt_gentoo_rpi_eeprom_update_service_name }}"
        owner: root
        group: root
        mode: '0644'
      when:
        - openwrt_gentoo_enabled | bool
        - openwrt_gentoo_rpi_eeprom_enabled | bool
      tags:
        - rpi_eeprom
        - firmware
        - eeprom_update

    - name: rpi-eeprom auto update timer を rootfs に配置
      ansible.builtin.template:
        src: systemd/rpi-eeprom-auto-update.timer.j2
        dest: "{{ openwrt_gentoo_rootfs_dir }}/etc/systemd/system/{{ openwrt_gentoo_rpi_eeprom_update_timer_name }}"
        owner: root
        group: root
        mode: '0644'
      when:
        - openwrt_gentoo_enabled | bool
        - openwrt_gentoo_rpi_eeprom_enabled | bool
      tags:
        - rpi_eeprom
        - firmware
        - eeprom_update

    - name: rpi-eeprom auto update timer を rootfs で disable
      ansible.builtin.file:
        path: "{{ openwrt_gentoo_rootfs_dir }}/etc/systemd/system/timers.target.wants/{{ openwrt_gentoo_rpi_eeprom_update_timer_name }}"
        state: absent
      when:
        - openwrt_gentoo_enabled | bool
        - openwrt_gentoo_rpi_eeprom_enabled | bool
        - not (openwrt_gentoo_rpi_eeprom_update_timer_enabled | bool)
      tags:
        - rpi_eeprom
        - firmware
        - eeprom_update

    - name: rpi-eeprom auto update timer を rootfs で enable
      ansible.builtin.file:
        src: "../{{ openwrt_gentoo_rpi_eeprom_update_timer_name }}"
        dest: "{{ openwrt_gentoo_rootfs_dir }}/etc/systemd/system/timers.target.wants/{{ openwrt_gentoo_rpi_eeprom_update_timer_name }}"
        state: link
        force: true
      when:
        - openwrt_gentoo_enabled | bool
        - openwrt_gentoo_rpi_eeprom_enabled | bool
        - openwrt_gentoo_rpi_eeprom_update_timer_enabled | bool
      tags:
        - rpi_eeprom
        - firmware
        - eeprom_update

    - name: distcc 導入済み package db を確認
      ansible.builtin.find:
        paths: "{{ item }}/var/db/pkg/sys-devel"
        patterns: "distcc-*"
        file_type: directory
      loop: "{{ openwrt_gentoo_pxe_rootfs_dirs | default([openwrt_gentoo_rootfs_dir]) }}"
      loop_control:
        label: "{{ item }}"
      register: openwrt_gentoo_distcc_pkg_dirs
      when:
        - openwrt_gentoo_distcc_enabled | bool
      tags:
        - gentoo_distcc

    - name: distcc を導入
      ansible.builtin.shell: |
        set -euo pipefail
        chroot {{ item.item }} {{ openwrt_gentoo_chroot_shell }} -lc '
          set -euo pipefail
          env-update
          echo env-update
          export DEBUGINFOD_URLS=""
          set +u
          source /etc/profile
          set -u
          echo source
          export FEATURES="${FEATURES:-} -userpriv -usersandbox"
          echo export
          PKGS="sys-devel/distcc"
          emerge --usepkg --oneshot --quiet-build=y ${PKGS}
        '
      args:
        executable: /bin/ash
      changed_when: true
      loop: "{{ openwrt_gentoo_distcc_pkg_dirs.results | default([]) }}"
      loop_control:
        label: "{{ item.item | default('unknown') }}"
      when:
        - openwrt_gentoo_distcc_enabled | bool
        - (item.matched | default(0) | int) == 0
      tags:
        - gentoo_distcc

    - name: ansible ユーザを事前作成（UID/GID 固定）
      ansible.builtin.shell: |
        set -euo pipefail
        chroot {{ item }} {{ openwrt_gentoo_chroot_shell }} -lc '
          name="{{ openwrt_gentoo_ansible_user_name }}"
          uid="{{ openwrt_gentoo_ansible_user_uid }}"
          gid="{{ openwrt_gentoo_ansible_user_gid }}"
          shell="{{ openwrt_gentoo_ansible_user_shell }}"
          changed=0
          primary_group=""
          if getent group "$name" >/dev/null 2>&1; then
            current_gid="$(getent group "$name" | cut -d: -f3 || true)"
            if [ -n "$current_gid" ] && [ "$current_gid" != "$gid" ]; then
              groupmod -g "$gid" "$name"
              changed=1
            fi
            primary_group="$name"
          else
            existing_group="$(getent group "$gid" | cut -d: -f1 || true)"
            if [ -n "$existing_group" ]; then
              primary_group="$existing_group"
            else
              groupadd -g "$gid" "$name"
              changed=1
              primary_group="$name"
            fi
          fi
          if ! getent group wheel >/dev/null 2>&1; then
            groupadd wheel
            changed=1
          fi
          if id "$name" >/dev/null 2>&1; then
            passwd_entry="$(getent passwd "$name")"
            current_uid="$(printf "%s\n" "$passwd_entry" | cut -d: -f3)"
            current_shell="$(printf "%s\n" "$passwd_entry" | cut -d: -f7)"
            if [ "$current_shell" != "$shell" ]; then
              chsh -s "$shell" "$name" || true
              changed=1
            fi
            if [ "$current_uid" != "$uid" ]; then
              usermod -u "$uid" "$name"
              changed=1
            fi
            if [ -n "$primary_group" ]; then
              current_primary_gid="$(id -g "$name")"
              desired_primary_gid="$(getent group "$primary_group" | cut -d: -f3)"
              if [ -n "$desired_primary_gid" ] && [ "$current_primary_gid" != "$desired_primary_gid" ]; then
                usermod -g "$primary_group" "$name"
                changed=1
              fi
            fi
            if ! id -nG "$name" | tr " " "\n" | grep -qx wheel; then
              usermod -a -G wheel "$name"
              changed=1
            fi
          else
            useradd -m -s "$shell" -u "$uid" -g "$primary_group" -G wheel "$name"
            changed=1
          fi
          if [ "$changed" -eq 1 ]; then
            echo changed
          else
            echo unchanged
          fi
        '
      args:
        executable: /bin/ash
      register: openwrt_gentoo_ansible_user_create
      changed_when: "'changed' in (openwrt_gentoo_ansible_user_create.stdout_lines | default([]))"
      loop: "{{ openwrt_gentoo_pxe_rootfs_dirs | default([openwrt_gentoo_rootfs_dir]) }}"
      loop_control:
        label: "{{ item }}"
      when:
        - openwrt_gentoo_ansible_user_enabled | bool
      tags:
        - pxe_users

    - name: PXE クライアントユーザーを作成
      ansible.builtin.shell: |
        set -euo pipefail
        chroot {{ item.0 }} {{ openwrt_gentoo_chroot_shell }} -lc '
          name="{{ item.1.name }}"
          shell="{{ item.1.shell | default("/bin/bash") }}"
          groups="{{ (item.1.groups | default([])) | join(",") }}"
          uid="{{ item.1.uid | default("") }}"
          gid="{{ item.1.gid | default("") }}"
          home="{{ item.1.home | default("") }}"
          create_home="{{ item.1.create_home | default(true) | ternary("1", "0") }}"
          changed=0
          primary_group=""
          if [ -n "$gid" ]; then
            existing_group="$(getent group "$gid" | cut -d: -f1 || true)"
            if [ -n "$existing_group" ]; then
              primary_group="$existing_group"
            else
              groupadd -g "$gid" "$name"
              changed=1
              primary_group="$name"
            fi
          fi
          if id "$name" >/dev/null 2>&1; then
            passwd_entry="$(getent passwd "$name")"
            current_uid="$(printf "%s\n" "$passwd_entry" | cut -d: -f3)"
            current_home="$(printf "%s\n" "$passwd_entry" | cut -d: -f6)"
            current_shell="$(printf "%s\n" "$passwd_entry" | cut -d: -f7)"
            if [ "$current_shell" != "$shell" ]; then
              chsh -s "$shell" "$name" || true
              changed=1
            fi
            if [ -n "$groups" ]; then
              missing_groups=""
              IFS=,
              for group in $groups; do
                group="$(printf "%s" "$group" | xargs)"
                [ -n "$group" ] || continue
                if ! id -nG "$name" | tr " " "\n" | grep -qx "$group"; then
                  if [ -n "$missing_groups" ]; then
                    missing_groups="$missing_groups,$group"
                  else
                    missing_groups="$group"
                  fi
                fi
              done
              unset IFS
              if [ -n "$missing_groups" ]; then
                usermod -a -G "$missing_groups" "$name"
                changed=1
              fi
            fi
            if [ -n "$uid" ] && [ "$current_uid" != "$uid" ]; then
              usermod -u "$uid" "$name"
              changed=1
            fi
            if [ -n "$primary_group" ]; then
              current_primary_gid="$(id -g "$name")"
              desired_primary_gid="$(getent group "$primary_group" | cut -d: -f3)"
              if [ -n "$desired_primary_gid" ] && [ "$current_primary_gid" != "$desired_primary_gid" ]; then
                usermod -g "$primary_group" "$name"
                changed=1
              fi
            fi
            if [ -n "$home" ] && [ "$current_home" != "$home" ]; then
              usermod -d "$home" "$name"
              changed=1
            fi
          else
            if [ "$create_home" = "1" ]; then
              useradd_args="-m -s \"$shell\""
            else
              useradd_args="-M -s \"$shell\""
            fi
            if [ -n "$uid" ]; then
              useradd_args="$useradd_args -u \"$uid\""
            fi
            if [ -n "$primary_group" ]; then
              useradd_args="$useradd_args -g \"$primary_group\""
            fi
            if [ -n "$groups" ]; then
              useradd_args="$useradd_args -G \"$groups\""
            fi
            if [ -n "$home" ]; then
              useradd_args="$useradd_args -d \"$home\""
            fi
            if [ -n "$useradd_args" ]; then
              eval "useradd $useradd_args \"$name\""
            else
              useradd -m -s "$shell" "$name"
            fi
            changed=1
          fi
          if [ "$changed" -eq 1 ]; then
            echo changed
          else
            echo unchanged
          fi
        '
      args:
        executable: /bin/ash
      register: openwrt_gentoo_pxe_user_create
      changed_when: "'changed' in (openwrt_gentoo_pxe_user_create.stdout_lines | default([]))"
      loop: "{{ (openwrt_gentoo_pxe_rootfs_dirs | default([openwrt_gentoo_rootfs_dir])) | product(openwrt_gentoo_pxe_users | default([])) | list }}"
      loop_control:
        label: "{{ item.0 }}:{{ item.1.name }}"
      when:
        - openwrt_gentoo_pxe_users_required | default(false)
      tags:
        - pxe_users

    - name: PXE クライアントユーザー用 sshd authorized_keys ディレクトリを作成
      ansible.builtin.file:
        path: "{{ item }}/etc/ssh/authorized_keys"
        state: directory
        owner: root
        group: root
        mode: '0755'
      loop: "{{ openwrt_gentoo_pxe_rootfs_dirs | default([openwrt_gentoo_rootfs_dir]) }}"
      loop_control:
        label: "{{ item }}"
      when:
        - openwrt_gentoo_pxe_users_required | default(false)
      tags:
        - pxe_users
        - pxe_ssh_keys

    - name: PXE rootfs sshd_config に system authorized_keys を許可
      ansible.builtin.lineinfile:
        path: "{{ item }}/etc/ssh/sshd_config"
        regexp: '^\s*AuthorizedKeysFile\s+'
        line: "AuthorizedKeysFile .ssh/authorized_keys /etc/ssh/authorized_keys/%u"
        create: true
        owner: root
        group: root
        mode: '0644'
      loop: "{{ openwrt_gentoo_pxe_rootfs_dirs | default([openwrt_gentoo_rootfs_dir]) }}"
      loop_control:
        label: "{{ item }}"
      when:
        - openwrt_gentoo_pxe_users_required | default(false)
      tags:
        - pxe_users
        - pxe_ssh_keys

    - name: PXE クライアントユーザーの authorized_keys を配置
      ansible.builtin.shell: |
        set -euo pipefail
        PXE_USER={{ item.1.0.name | quote }} \
        PXE_AUTHORIZED_KEY={{ item.1.1 | quote }} \
        PXE_AUTHORIZED_KEYS_FILE={{ item.1.0.authorized_keys_file | default("") | quote }} \
        chroot {{ item.0 }} {{ openwrt_gentoo_chroot_shell }} -lc '
          set -euo pipefail
          user="$PXE_USER"
          key="$PXE_AUTHORIZED_KEY"
          auth_file="$PXE_AUTHORIZED_KEYS_FILE"
          changed=0
          if [ -n "$auth_file" ]; then
            install -d -m 755 "$(dirname "$auth_file")"
            touch "$auth_file"
            if ! grep -qxF "$key" "$auth_file"; then
              printf "%s\n" "$key" >> "$auth_file"
              changed=1
            fi
            chown root:root "$auth_file"
            chmod 644 "$auth_file"
            if [ "$changed" -eq 1 ]; then echo changed; else echo unchanged; fi
            exit 0
          fi
          home_dir="$(getent passwd "$user" | cut -d: -f6)"
          if [ -z "$home_dir" ]; then
            exit 1
          fi
          install -d -m 700 "$home_dir/.ssh"
          touch "$home_dir/.ssh/authorized_keys"
          if ! grep -qxF "$key" "$home_dir/.ssh/authorized_keys"; then
            printf "%s\n" "$key" >> "$home_dir/.ssh/authorized_keys"
            changed=1
          fi
          chown -R "$user":"$user" "$home_dir/.ssh"
          chmod 700 "$home_dir/.ssh"
          chmod 600 "$home_dir/.ssh/authorized_keys"
          if [ "$changed" -eq 1 ]; then echo changed; else echo unchanged; fi
        '
      args:
        executable: /bin/ash
      register: openwrt_gentoo_pxe_user_authorized_keys
      changed_when: "'changed' in (openwrt_gentoo_pxe_user_authorized_keys.stdout_lines | default([]))"
      loop: "{{ (openwrt_gentoo_pxe_rootfs_dirs | default([openwrt_gentoo_rootfs_dir])) | product(openwrt_gentoo_pxe_users | default([]) | subelements('authorized_keys', skip_missing=True)) | list }}"
      loop_control:
        label: "{{ item.0 }}:{{ item.1.0.name }}"
      no_log: true
      when:
        - openwrt_gentoo_pxe_users_required | default(false)
      tags:
        - pxe_users
        - pxe_ssh_keys

    - name: PXE クライアントユーザーの authorized_keys エントリを検証
      ansible.builtin.shell: |
        set -euo pipefail
        PXE_USER={{ item.1.0.name | quote }} \
        PXE_AUTHORIZED_KEY={{ item.1.1 | quote }} \
        PXE_AUTHORIZED_KEYS_FILE={{ item.1.0.authorized_keys_file | default("") | quote }} \
        chroot {{ item.0 }} {{ openwrt_gentoo_chroot_shell }} -lc '
          set -euo pipefail
          user="$PXE_USER"
          key="$PXE_AUTHORIZED_KEY"
          auth_file="$PXE_AUTHORIZED_KEYS_FILE"
          if [ -n "$auth_file" ]; then
            if [ ! -f "$auth_file" ]; then
              echo "user=$user authorized_keys=missing path=$auth_file"
              exit 1
            fi
            if ! grep -qxF "$key" "$auth_file"; then
              echo "user=$user authorized_key=missing path=$auth_file"
              exit 1
            fi
            echo "user=$user authorized_key=present path=$auth_file"
            exit 0
          fi
          home_dir="$(getent passwd "$user" | cut -d: -f6)"
          if [ -z "$home_dir" ]; then
            echo "user=$user home=missing"
            exit 1
          fi
          if [ ! -d "$home_dir/.ssh" ]; then
            echo "user=$user ssh_dir=missing"
            exit 1
          fi
          if [ ! -f "$home_dir/.ssh/authorized_keys" ]; then
            echo "user=$user authorized_keys=missing"
            exit 1
          fi
          if ! grep -qxF "$key" "$home_dir/.ssh/authorized_keys"; then
            echo "user=$user authorized_key=missing"
            exit 1
          fi
          echo "user=$user authorized_key=present"
        '
      args:
        executable: /bin/ash
      changed_when: false
      loop: "{{ (openwrt_gentoo_pxe_rootfs_dirs | default([openwrt_gentoo_rootfs_dir])) | product(openwrt_gentoo_pxe_users | default([]) | subelements('authorized_keys', skip_missing=True)) | list }}"
      loop_control:
        label: "{{ item.0 }}:{{ item.1.0.name }}"
      no_log: true
      when:
        - openwrt_gentoo_pxe_users_required | default(false)
      tags:
        - pxe_users
        - pxe_ssh_keys

    - name: controller の authorized_keys を読み込み
      ansible.builtin.set_fact:
        openwrt_gentoo_ansible_user_controller_authorized_keys: >-
          {{
            lookup(
              'ansible.builtin.file',
              openwrt_gentoo_ansible_user_authorized_keys_file,
              errors='ignore'
            ).splitlines()
            | map('trim')
            | reject('equalto', '')
            | reject('match', '^#')
            | list
          }}
      no_log: true
      when:
        - openwrt_gentoo_ansible_user_enabled | bool
        - openwrt_gentoo_ansible_user_authorized_keys_from_controller | bool
      tags:
        - pxe_users
        - pxe_ssh_keys

    - name: ansible ユーザに controller authorized_keys を追加
      ansible.builtin.shell: |
        set -euo pipefail
        PXE_USER={{ openwrt_gentoo_ansible_user_name | quote }} \
        PXE_AUTHORIZED_KEY={{ item.1 | quote }} \
        chroot {{ item.0 }} {{ openwrt_gentoo_chroot_shell }} -lc '
          set -euo pipefail
          user="$PXE_USER"
          key="$PXE_AUTHORIZED_KEY"
          changed=0
          home_dir="$(getent passwd "$user" | cut -d: -f6)"
          if [ -z "$home_dir" ]; then
            exit 1
          fi
          install -d -m 700 "$home_dir/.ssh"
          touch "$home_dir/.ssh/authorized_keys"
          if ! grep -qxF "$key" "$home_dir/.ssh/authorized_keys"; then
            printf "%s\n" "$key" >> "$home_dir/.ssh/authorized_keys"
            changed=1
          fi
          chown -R "$user":"$user" "$home_dir/.ssh"
          chmod 700 "$home_dir/.ssh"
          chmod 600 "$home_dir/.ssh/authorized_keys"
          if [ "$changed" -eq 1 ]; then echo changed; else echo unchanged; fi
        '
      args:
        executable: /bin/ash
      register: openwrt_gentoo_ansible_user_authorized_keys
      changed_when: "'changed' in (openwrt_gentoo_ansible_user_authorized_keys.stdout_lines | default([]))"
      loop: "{{ (openwrt_gentoo_pxe_rootfs_dirs | default([openwrt_gentoo_rootfs_dir])) | product(openwrt_gentoo_ansible_user_controller_authorized_keys | default([])) | list }}"
      loop_control:
        label: "{{ item.0 }}:{{ openwrt_gentoo_ansible_user_name }}"
      no_log: true
      when:
        - openwrt_gentoo_ansible_user_enabled | bool
        - openwrt_gentoo_ansible_user_authorized_keys_from_controller | bool
        - (openwrt_gentoo_ansible_user_controller_authorized_keys | default([])) | length > 0
      tags:
        - pxe_users
        - pxe_ssh_keys

    - name: ansible ユーザの controller authorized_keys エントリを検証
      ansible.builtin.shell: |
        set -euo pipefail
        PXE_USER={{ openwrt_gentoo_ansible_user_name | quote }} \
        PXE_AUTHORIZED_KEY={{ item.1 | quote }} \
        chroot {{ item.0 }} {{ openwrt_gentoo_chroot_shell }} -lc '
          set -euo pipefail
          user="$PXE_USER"
          key="$PXE_AUTHORIZED_KEY"
          home_dir="$(getent passwd "$user" | cut -d: -f6)"
          if [ -z "$home_dir" ]; then
            echo "user=$user home=missing"
            exit 1
          fi
          if [ ! -f "$home_dir/.ssh/authorized_keys" ]; then
            echo "user=$user authorized_keys=missing"
            exit 1
          fi
          if ! grep -qxF "$key" "$home_dir/.ssh/authorized_keys"; then
            echo "user=$user authorized_key=missing"
            exit 1
          fi
          echo "user=$user authorized_key=present"
        '
      args:
        executable: /bin/ash
      changed_when: false
      loop: "{{ (openwrt_gentoo_pxe_rootfs_dirs | default([openwrt_gentoo_rootfs_dir])) | product(openwrt_gentoo_ansible_user_controller_authorized_keys | default([])) | list }}"
      loop_control:
        label: "{{ item.0 }}:{{ openwrt_gentoo_ansible_user_name }}"
      no_log: true
      when:
        - openwrt_gentoo_ansible_user_enabled | bool
        - openwrt_gentoo_ansible_user_authorized_keys_from_controller | bool
        - (openwrt_gentoo_ansible_user_controller_authorized_keys | default([])) | length > 0
      tags:
        - pxe_users
        - pxe_ssh_keys

    - name: wheel グループにパスワードなし sudo を付与
      ansible.builtin.shell: |
        set -euo pipefail
        chroot {{ item }} {{ openwrt_gentoo_chroot_shell }} -lc '
          line="%wheel ALL=(ALL:ALL) NOPASSWD: ALL"
          changed=0
          if [ ! -f /etc/sudoers ]; then
            echo "# sudoers (created by ansible)" > /etc/sudoers
            chmod 0440 /etc/sudoers
            changed=1
          fi
          if ! grep -q "^%wheel .*NOPASSWD" /etc/sudoers; then
            echo "$line" >> /etc/sudoers
            chmod 0440 /etc/sudoers
            changed=1
          fi
          if [ "$changed" -eq 1 ]; then echo changed; else echo unchanged; fi
        '
      args:
        executable: /bin/ash
      register: openwrt_gentoo_wheel_sudoers
      changed_when: "'changed' in (openwrt_gentoo_wheel_sudoers.stdout_lines | default([]))"
      loop: "{{ openwrt_gentoo_pxe_rootfs_dirs | default([openwrt_gentoo_rootfs_dir]) }}"
      loop_control:
        label: "{{ item }}"
      when:
        - (openwrt_gentoo_pxe_users_required | default(false)) or (openwrt_gentoo_ansible_user_enabled | bool)
      tags:
        - pxe_users

  vars:
    k3s_base_baseline_packages:
      - app-admin/ansible-core
      - app-admin/logrotate
      - app-admin/rsyslog
      - app-editors/neovim
      - app-misc/jq
      - app-misc/resolve-march-native
      - app-misc/tmux
      - app-portage/gentoolkit
      - app-shells/fish
      - app-shells/fzf
      - app-vim/vim-tmux
      - dev-vcs/git
      - net-analyzer/netcat
      - net-dns/bind-tools
      - net-firewall/iptables
      - net-firewall/nftables
      - net-fs/nfs-utils
      - net-libs/nodejs
      - net-wireless/iw
      - sys-apps/bubblewrap
      - sys-apps/ripgrep
      - sys-apps/zram-generator
      - sys-cluster/kubectl
      - sys-devel/distcc
      - sys-fs/f2fs-tools
      - sys-process/cronie
      - "{{ openwrt_gentoo_k3s_base_baseline_terraform_package_atom }}"
    k3s_base_baseline_package_use:
      - "net-libs/nodejs npm"
      - "net-firewall/iptables nftables"
    k3s_base_baseline_package_accept_keywords:
      - "app-shells/fzf **"
      - "sys-cluster/kubectl ~arm64"
      - "=sys-apps/zram-generator-1.2.1 ~arm64"
      - "{{ openwrt_gentoo_k3s_base_baseline_terraform_package_accept_keywords }}"
    k3s_base_baseline_package_license: "{{ openwrt_gentoo_k3s_base_baseline_terraform_package_license }}"

  always:
    - name: Gentoo chroot 用 bind mount を解除
      ansible.builtin.shell: |
        set -euo pipefail
        target="{{ item }}"
        if grep -qs " $target " /proc/mounts; then
          umount -l "$target" || umount "$target" || true
        fi
      args:
        executable: /bin/ash
      changed_when: false
      loop: "{{ (openwrt_gentoo_chroot_bind_targets | default([])) | reverse | list }}"
      loop_control:
        label: "{{ item }}"
      when: (openwrt_gentoo_chroot_bind_targets | default([])) | length > 0
      tags:
        - gentoo_packages
        - official_binhost
        - pxe_users
        - pxe_ssh_keys
        - rpi_eeprom
        - rpi_wireless

  when:
    - openwrt_gentoo_enabled | bool
    - >
      (openwrt_gentoo_chroot_work_required | default(false) | bool)
      or ('eeprom_config' in (ansible_run_tags | default([])))
