          USE="{{ openwrt_gentoo_sudo_use_flags }}" emerge {{ openwrt_gentoo_rpi_wireless_emerge_args if (openwrt_gentoo_rpi_wireless_enabled | bool) else '--usepkg --quiet-build=y' }} ${PKGS}
