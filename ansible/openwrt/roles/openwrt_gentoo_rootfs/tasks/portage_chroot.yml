        owner: root
        group: root
        mode: '0755'
      loop:
        - /etc/systemd/system
        - /etc/systemd/system/bluetooth.target.wants
      when:
        - openwrt_gentoo_enabled | bool
        - openwrt_gentoo_rpi_wireless_enabled | bool
        - openwrt_gentoo_rpi_wireless_bluetooth_service_enabled | bool
      tags:
        - rpi_wireless

