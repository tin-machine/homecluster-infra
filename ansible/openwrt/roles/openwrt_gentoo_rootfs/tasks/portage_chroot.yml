      ansible.builtin.file:
        path: "{{ openwrt_gentoo_rootfs_dir }}{{ item }}"
        state: absent
      loop:
        - /etc/systemd/system/bluetooth.target.wants/bluetooth.service
        - /etc/systemd/system/dbus-org.bluez.service
      when:
        - openwrt_gentoo_enabled | bool
        - openwrt_gentoo_rpi_wireless_enabled | bool
        - not (openwrt_gentoo_rpi_wireless_bluetooth_service_enabled | bool)
      tags:
        - rpi_wireless

