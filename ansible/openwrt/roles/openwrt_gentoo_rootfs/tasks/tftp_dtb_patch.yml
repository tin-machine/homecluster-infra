---
- name: TFTP hosts の DTB から cgroup_disable=memory を除去
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import pathlib
        import sys
        path = pathlib.Path(sys.argv[1])
        if not path.exists():
            print("missing")
            sys.exit(0)
        data = path.read_bytes()
        needle = b"cgroup_disable=memory"
        new_data = data.replace(needle, b" " * len(needle))
        if new_data != data:
            path.write_bytes(new_data)
            print("patched")
        else:
            print("unchanged")
      - "/srv/gentoo/tftp-root/{{ item.0.board_hash }}/{{ item.1 }}"
  register: openwrt_gentoo_tftp_dtb_bootargs_patch
  changed_when: "'patched' in openwrt_gentoo_tftp_dtb_bootargs_patch.stdout"
  loop: "{{ (openwrt_gentoo_tftp_host_entries | default([])) | subelements('symlinks', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }}/{{ item.1 }}"
  no_log: "{{ openwrt_pxe_client_catalog_no_log | default(true) | bool }}"
  when:
    - openwrt_gentoo_enabled | bool
    - openwrt_gentoo_tftp_strip_dtb_cgroup_disable_memory | bool
    - (openwrt_gentoo_tftp_hosts_mode | default('symlink')) == 'directory'
    - (item.1 | string) is match('.*\\.dtb$')
  tags:
    - pxe
    - tftp
    - tftp_hosts
