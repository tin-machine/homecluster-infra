---
- name: branch_type が正しい値か検証
  ansible.builtin.assert:
    that:
      - branch_type in ["releases", "snapshots"]
    fail_msg: "branch_type には releases または snapshots を指定してください。"

- name: OpenWrt 情報を取得
  ansible.builtin.import_tasks: detect.yml

- name: release_version 未設定時は現在のバージョンを使用
  when: branch_type == "releases" and (
          release_version is not defined
          or release_version is none
          or ((release_version | string | trim) | length == 0)
        )
  ansible.builtin.set_fact:
    release_version: "{{ owrt_current_release }}"
    owrt_release_version_inferred: true

- name: release_version を正規化
  when: branch_type == "releases"
  ansible.builtin.set_fact:
    owrt_release_version_normalized: "{{ release_version | default('', true) | string | trim }}"

- name: リリースバージョンを Fact 化
  when: branch_type == "releases"
  ansible.builtin.set_fact:
    owrt_branch_version: "{{ owrt_release_version_normalized }}"

- name: ダウンロード URL を組み立て
  ansible.builtin.import_tasks: build_url.yml

- name: アップグレード必要性を計算
  ansible.builtin.set_fact:
    owrt_upgrade_target: >-
      {{ (branch_type == 'releases')
          | ternary(owrt_release_version_normalized | default('', true), 'SNAPSHOT') }}
    owrt_upgrade_required: >-
      {{ (branch_type == 'releases')
          | ternary( (owrt_release_version_normalized | default('', true) | length > 0) and (owrt_current_release != owrt_release_version_normalized),
                     true ) }}

- name: アップグレードサマリを表示
  ansible.builtin.debug:
    msg:
      current_release: "{{ owrt_current_release }}"
      target: "{{ owrt_upgrade_target }}"
      image_url: "{{ owrt_image_url }}"
      upgrade_required: "{{ owrt_upgrade_required }}"
      release_version_inferred: "{{ owrt_release_version_inferred | default(false) }}"

- name: ターゲットバージョンに到達済み
  ansible.builtin.debug:
    msg: "ターゲット {{ owrt_upgrade_target }} に到達済みのため sysupgrade は実行しません。"
  when:
    - perform_upgrade | bool
    - not owrt_upgrade_required

- name: sysupgrade の検証とダウンロード
  when:
    - perform_upgrade | bool
    - owrt_upgrade_required
  ansible.builtin.import_tasks: verify.yml

- name: バックアップを取得
  when:
    - perform_upgrade | bool
    - owrt_upgrade_required
  ansible.builtin.import_tasks: backup.yml

- name: sysupgrade confirmation token を計算
  when:
    - perform_upgrade | bool
    - owrt_upgrade_required
  ansible.builtin.set_fact:
    owrt_sysupgrade_confirm_expected: "{{ inventory_hostname }} {{ owrt_upgrade_target }}"

- name: sysupgrade confirmation requirement を表示
  when:
    - perform_upgrade | bool
    - owrt_upgrade_required
  ansible.builtin.debug:
    msg:
      expected_confirmation: "{{ owrt_sysupgrade_confirm_expected }}"
      provided_confirmation_matches: "{{ (sysupgrade_confirm | string) == (owrt_sysupgrade_confirm_expected | string) }}"
      backup_fetch_enabled: "{{ backup_fetch_enabled | bool }}"
      fetched_backup_path: "{{ owrt_backup_fetch_path | default('not-fetched') }}"

- name: sysupgrade 実行 confirmation を検証
  when:
    - perform_upgrade | bool
    - owrt_upgrade_required
  ansible.builtin.assert:
    that:
      - (sysupgrade_confirm | string) == (owrt_sysupgrade_confirm_expected | string)
    fail_msg: >-
      sysupgrade を実行するには
      -e openwrt_sysupgrade_confirm='{{ owrt_sysupgrade_confirm_expected }}'
      を明示してください。backup={{ owrt_backup_path | default('not-created') }},
      fetched={{ owrt_backup_fetch_path | default('not-fetched') }}.

- name: sysupgrade を実行
  when:
    - perform_upgrade | bool
    - owrt_upgrade_required
  ansible.builtin.import_tasks: upgrade.yml
