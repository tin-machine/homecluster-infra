---
# OpenWrt sysupgrade ロールのデフォルト値
branch_type: "releases"        # "releases" か "snapshots"
release_version: null          # releases のときは inventory で設定
preserve_settings: true        # false で -n（設定初期化）
perform_upgrade: false         # true にすると sysupgrade を実行
download_dir: "/tmp"           # ルーター上の作業パス
image_fs_type: "squashfs"
image_kind: "sysupgrade"
image_ext: "bin"
verify_sha256: true
verify_md5: false
base_url_releases: "https://downloads.openwrt.org/releases"
base_url_snapshots: "https://downloads.openwrt.org/snapshots"
wait_for_reconnect: true
wait_for_reconnect_delay: 30    # 秒
wait_for_reconnect_timeout: 600 # 秒（10分）
