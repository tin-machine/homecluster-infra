---
# Public OpenWrt / PXE baseline playbook.
# Site-specific inventory, secrets, and storage exports stay outside this repository.

- name: OpenWrt PXE infrastructure
  hosts: openwrt
  gather_facts: false
  become: false
  roles:
    - role: openwrt_detect
      tags: ['always']
    - role: bootstrap_python
      tags: ['never', 'bootstrap']

    - role: openwrt_storage
      tags: ['never', 'openwrt_storage']
      when: openwrt_enable_storage | default(false)
    - role: openwrt_iscsi_target
      tags: ['never', 'iscsi_target']
    - role: openwrt_pxe_client_catalog
      tags: ['always', 'pxe', 'dhcp', 'pxe_dnsmasq', 'pxe_hosts', 'tftp', 'tftp_hosts', 'pxe_tftp_switch', 'pxe_ansible_pull', 'pxe_release_bundle', 'pxe_rootfs_prune', 'pxe_timesync']
    - role: openwrt_gentoo_rootfs
      tags: ['never', 'pxe', 'pxe_rootfs']
    - role: openwrt_backup_share
      tags: ['backup_share']
    - role: openwrt_nfs_server
      tags: ['pxe', 'pxe_nfs', 'backup_share']
    - role: openwrt_network
      tags: ['network']
    - role: openwrt_ntp
      tags: ['ntp', 'openwrt_ntp']
    - role: openwrt_firewall
      tags: ['firewall']
    - role: openwrt_banip
      tags: ['banip', 'openwrt_banip']
      when: (openwrt_banip_install | default(false) | bool) or (openwrt_banip_enabled | default(false) | bool)
    - role: openwrt_admin_tools
      tags: ['admin_tools', 'openwrt_admin_tools']
      when: openwrt_enable_admin_tools | default(false) | bool
    - role: openwrt_dhcp
      tags: ['dhcp']
    - role: openwrt_pxe_dnsmasq
      tags: ['pxe', 'pxe_dnsmasq']
    - role: openwrt_wireless
      tags: ['wireless']
      when: openwrt_enable_wireless | default(false)
    - role: openwrt_sysupgrade
      tags: ['never', 'sysupgrade']
      branch_type: "{{ openwrt_branch_type | default('releases') }}"
      release_version: "{{ openwrt_release_version | default(omit, true) }}"
      image_ext: "{{ openwrt_image_ext | default('bin') }}"
      perform_upgrade: "{{ openwrt_perform_upgrade | default(false) }}"
      preserve_settings: "{{ openwrt_preserve_settings | default(true) }}"
      download_dir: "{{ openwrt_download_dir | default('/tmp') }}"
      backup_fetch_enabled: "{{ openwrt_sysupgrade_backup_fetch_enabled | default(true) }}"
      backup_dest: "{{ openwrt_sysupgrade_backup_dest | default('~/.local/state/homecluster/openwrt-sysupgrade-backups') }}"
      sysupgrade_confirm: "{{ openwrt_sysupgrade_confirm | default('') }}"
      verify_sha256: "{{ openwrt_verify_sha256 | default(true) }}"
      verify_md5: "{{ openwrt_verify_md5 | default(true) }}"
      sysupgrade_mode: >-
        {{ openwrt_sysupgrade_mode
           | default((openwrt_perform_upgrade | default(false) | bool) | ternary('upgrade', 'detect')) }}
      recovery_file_ready: "{{ openwrt_sysupgrade_recovery_file_ready | default(false) }}"
      serial_or_usb_recovery_ready: "{{ openwrt_sysupgrade_serial_or_usb_recovery_ready | default(false) }}"
      k3s_baseline_ready: "{{ openwrt_sysupgrade_k3s_baseline_ready | default(false) }}"
    - role: openwrt_frr
      tags: ['frr', 'openwrt_frr']
      when: openwrt_enable_frr | default(false) | bool
    - role: openwrt_prometheus_exporter
      tags: ['prometheus_exporter', 'openwrt_prometheus_exporter']
      when: openwrt_enable_prometheus_exporter | default(false) | bool
    - role: openwrt_syslog_remote
      tags: ['syslog_remote', 'openwrt_syslog_remote']
      when: openwrt_syslog_remote_enabled | default(false) | bool
  tasks:
    - name: Gentoo PXE TFTP 切替だけを反映
      ansible.builtin.include_role:
        name: openwrt_gentoo_rootfs
        tasks_from: tftp_switch
        apply:
          tags:
            - pxe_tftp_switch
      tags:
        - never
        - pxe_tftp_switch

    - name: Gentoo PXE networkd 設定だけを反映
      ansible.builtin.include_role:
        name: openwrt_gentoo_rootfs
        tasks_from: networkd_config
        apply:
          tags:
            - pxe_networkd_config
      tags:
        - never
        - pxe_networkd_config

    - name: Gentoo PXE rootfs clone だけを反映
      ansible.builtin.include_role:
        name: openwrt_gentoo_rootfs
        tasks_from: rootfs_clone
        apply:
          tags:
            - pxe_rootfs_clone
      tags:
        - never
        - pxe_rootfs_clone

    - name: Gentoo PXE rootfs prune 候補だけを確認
      ansible.builtin.include_role:
        name: openwrt_gentoo_rootfs
        tasks_from: rootfs_prune
        apply:
          tags:
            - pxe_rootfs_prune
      tags:
        - never
        - pxe_rootfs_prune

    - name: Gentoo PXE host release を rootfs maintenance 用に解決
      ansible.builtin.include_role:
        name: openwrt_gentoo_rootfs
        tasks_from: pxe_host_releases
        apply:
          tags:
            - pxe_rootfs_maintenance
      tags:
        - never
        - pxe_rootfs_maintenance

    - name: Gentoo PXE rootfs maintenance 候補だけを確認
      ansible.builtin.include_role:
        name: openwrt_gentoo_rootfs
        tasks_from: rootfs_prune
        apply:
          tags:
            - pxe_rootfs_maintenance
      tags:
        - never
        - pxe_rootfs_maintenance
